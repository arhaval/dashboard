<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arhaval Overlay Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<style>
/* ── EDITOR SHELL ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080808; color: #fff; font-family: 'IBM Plex Mono', monospace; overflow: hidden; }

#editor {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* top bar */
#topbar {
  grid-column: 1 / -1;
  background: #111; border-bottom: 1px solid #222;
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
}
#topbar h1 { font-size: 13px; font-weight: 600; color: #FF4D00; letter-spacing: 2px; text-transform: uppercase; }
#topbar .sep { width: 1px; height: 20px; background: #2A2A2A; }
#topbar .meta { font-size: 11px; color: #444; }
#topbar .spacer { flex: 1; }
#btn-clear {
  font-size: 11px; padding: 5px 14px; border-radius: 3px;
  background: transparent; border: 1px solid #333; color: #666;
  cursor: pointer; font-family: inherit; letter-spacing: 1px;
  transition: all .15s;
}
#btn-clear:hover { border-color: #555; color: #aaa; }

/* preview area */
#preview-wrap {
  position: relative; overflow: hidden;
  background: #0a0a0a;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
#preview-label {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: #333; letter-spacing: 2px;
  pointer-events: none; z-index: 999;
}
#canvas-wrap {
  position: absolute;
  transform-origin: top left;
}
#canvas {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  background: transparent;
}
/* Screen border */
#canvas-wrap::after {
  content: '';
  position: absolute; inset: 0;
  border: 2px solid #222; pointer-events: none;
}

/* sidebar */
#sidebar {
  background: #111; border-left: 1px solid #1e1e1e;
  overflow-y: auto; display: flex; flex-direction: column;
}

/* overlay tabs */
#overlay-tabs {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 12px;
  border-bottom: 1px solid #1e1e1e;
}
.ov-tab {
  font-size: 10px; padding: 5px 10px; border-radius: 3px; cursor: pointer;
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #666;
  font-family: inherit; letter-spacing: .5px; transition: all .15s;
}
.ov-tab:hover { color: #aaa; border-color: #444; }
.ov-tab.active { color: #fff; border-color: var(--tab-color, #FF4D00); background: color-mix(in srgb, var(--tab-color, #FF4D00) 12%, transparent); }

/* controls */
#controls { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label { font-size: 9px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
.ctrl-label span { color: #333; font-size: 9px; }

input[type="text"],
input[type="number"],
textarea,
select {
  background: #0d0d0d; border: 1px solid #222; color: #ddd;
  font-family: inherit; font-size: 12px; padding: 7px 10px;
  border-radius: 3px; width: 100%; outline: none; resize: none;
  transition: border-color .15s;
}
input[type="text"]:focus,
input[type="number"]:focus,
textarea:focus,
select:focus { border-color: #444; }
select option { background: #111; }

/* color swatches */
.swatches { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.swatch {
  width: 24px; height: 24px; border-radius: 3px; cursor: pointer;
  border: 2px solid transparent; transition: all .1s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: #fff; }
.swatch-custom {
  width: 24px; height: 24px; border-radius: 3px; cursor: pointer;
  border: 1px solid #333; overflow: hidden; flex-shrink: 0;
}
.swatch-custom input[type="color"] {
  width: 36px; height: 36px; margin: -6px; border: none;
  padding: 0; cursor: pointer; background: none;
}

/* slider */
.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type="range"] {
  flex: 1; accent-color: #FF4D00; height: 4px; padding: 0;
  background: none; border: none; cursor: pointer;
}
.slider-val { font-size: 11px; color: #666; min-width: 32px; text-align: right; }

/* toggle row */
.toggle-row { display: flex; gap: 6px; }
.tog-btn {
  flex: 1; padding: 6px; font-size: 10px; border-radius: 3px; cursor: pointer;
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #555;
  font-family: inherit; letter-spacing: .5px; text-align: center;
  transition: all .15s;
}
.tog-btn:hover { color: #aaa; }
.tog-btn.active { background: #1f1f1f; border-color: #FF4D00; color: #FF4D00; }

/* action buttons */
#actions { padding: 12px; border-top: 1px solid #1e1e1e; display: flex; flex-direction: column; gap: 8px; }
#btn-preview {
  padding: 12px; border-radius: 4px; font-size: 12px; font-weight: 600;
  background: #FF4D00; border: none; color: #fff; cursor: pointer;
  font-family: inherit; letter-spacing: 2px; text-transform: uppercase;
  transition: background .15s;
}
#btn-preview:hover { background: #FF6B2C; }
#btn-copy {
  padding: 8px; border-radius: 3px; font-size: 10px;
  background: transparent; border: 1px solid #2a2a2a; color: #555;
  cursor: pointer; font-family: inherit; letter-spacing: 1px;
  transition: all .15s;
}
#btn-copy:hover { border-color: #444; color: #aaa; }

/* ── OVERLAY CSS (1920×1080 canvas) ─────────────────────────────────────────── */
#canvas {
  font-family: 'Exo 2', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Banner */
.overlay-banner {
  position: absolute; left: 0; right: 0; z-index: 50;
  height: 88px;
  display: flex; align-items: center; padding: 0 56px; gap: 28px;
  opacity: 0;
}
.b-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.b-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; flex-shrink: 0;
}
.b-div { width: 1px; height: 36px; background: rgba(255,255,255,.12); flex-shrink: 0; }
.b-text { font-weight: 600; flex: 1; }
.b-bar { position: absolute; left: 0; right: 0; height: 2px; transform-origin: left; transform: scaleX(1); }
.b-bar.top    { top: 0; }
.b-bar.bottom { bottom: 0; }

/* Alert */
.overlay-alert {
  position: absolute; inset: 0; z-index: 90;
  display: flex; align-items: center; justify-content: center; opacity: 0;
}
.a-backdrop { position: absolute; inset: 0; }
.a-shockwave { position: absolute; width: 200px; height: 200px; border-radius: 50%; opacity: 0; }
.a-box {
  position: relative; background: rgba(10,10,10,0.95);
  border-radius: 8px; padding: 52px 96px; text-align: center;
  clip-path: polygon(16px 0, 100% 0, calc(100% - 16px) 100%, 0 100%);
  opacity: 0;
}
.a-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: 5px;
  text-transform: uppercase; margin-bottom: 18px;
}
.a-text { font-weight: 900; letter-spacing: -2px; max-width: 900px; line-height: 1.1; }
.a-particles { position: absolute; inset: -60px; pointer-events: none; }
.particle { position: absolute; border-radius: 50%; opacity: 0; }

/* Popup */
.overlay-popup {
  position: absolute; width: 400px;
  background: rgba(12,12,12,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px; padding: 22px 26px;
  z-index: 50; opacity: 0;
  box-shadow: 0 24px 72px rgba(0,0,0,.6);
}
.p-icon   { font-size: 28px; margin-bottom: 8px; line-height: 1; }
.p-title  {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 8px;
}
.p-text   { font-size: 19px; font-weight: 600; line-height: 1.45; color: #fff; }
.p-bar    { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; border-radius: 0 0 6px 6px; transform-origin: left; }

/* Lower Third */
.overlay-lower { position: absolute; left: 0; display: flex; align-items: stretch; z-index: 50; opacity: 0; }
.lower-accent-bar { width: 5px; flex-shrink: 0; }
.lower-body {
  background: rgba(5,5,5,0.93);
  padding: 14px 56px 14px 24px;
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
  clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 50%, calc(100% - 24px) 100%, 0 100%);
}
.lower-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
.lower-name { font-size: 28px; font-weight: 800; letter-spacing: -.5px; line-height: 1; color: #fff; }
.lower-sub  { font-size: 14px; font-weight: 500; color: rgba(255,255,255,.55); }

/* Hype */
.overlay-hype { position: absolute; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center; opacity: 0; }
.h-bg-flash   { position: absolute; inset: 0; opacity: 0; }
.h-text       { font-weight: 900; letter-spacing: -10px; text-transform: uppercase; color: transparent; paint-order: stroke fill; line-height: 1; position: relative; z-index: 1; opacity: 0; }
.h-text-solid { position: absolute; font-weight: 900; letter-spacing: -10px; text-transform: uppercase; line-height: 1; opacity: 0; filter: blur(40px); }

/* GG */
.overlay-gg { position: absolute; inset: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; }
.g-crown { font-size: 72px; line-height: 1; opacity: 0; }
.g-label { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 8px; text-transform: uppercase; color: rgba(255,255,255,.4); opacity: 0; }
.g-text  { font-weight: 900; color: #F5C842; text-shadow: 0 0 120px rgba(245,200,66,.6); line-height: .85; opacity: 0; }
.confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.confetti-piece { position: absolute; border-radius: 2px; opacity: 0; }

/* BRB */
.overlay-brb { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.91); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; opacity: 0; }
.brb-logo-ring { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
.brb-logo-ring svg { position: absolute; inset: 0; }
.brb-ring-pulse { fill: none; stroke-width: 2; }
.brb-ring-spin  { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 60 220; }
.brb-icon  { font-size: 52px; line-height: 1; position: relative; z-index: 1; }
.brb-title { font-size: 80px; font-weight: 900; letter-spacing: -4px; text-align: center; }
.brb-title em { font-style: normal; }
.brb-sub   { font-size: 20px; color: rgba(255,255,255,.4); letter-spacing: 2px; }
.brb-dots  { display: flex; gap: 12px; }
.brb-dot   { width: 10px; height: 10px; border-radius: 50%; }

/* Score */
.overlay-score { position: absolute; top: 32px; left: 50%; transform: translateX(-50%); z-index: 60; opacity: 0; min-width: 560px; }
.score-wrap    { background: rgba(12,12,12,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; box-shadow: 0 16px 60px rgba(0,0,0,.7); display: flex; align-items: stretch; }
.score-team    { padding: 18px 28px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.team-tag      { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,.4); }
.team-name     { font-size: 22px; font-weight: 800; text-align: center; color: #fff; }
.team-score    { font-size: 56px; font-weight: 900; line-height: 1; font-family: 'IBM Plex Mono', monospace; }
.score-team.left  .team-score { color: #EF4444; text-shadow: 0 0 30px rgba(239,68,68,.4); }
.score-team.right .team-score { color: #3B82F6; text-shadow: 0 0 30px rgba(59,130,246,.4); }
.score-mid { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18px 20px; border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); gap: 4px; }
.score-map-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.3); }
.score-map  { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.6); letter-spacing: 1px; }

/* Clip */
.overlay-clip { position: absolute; z-index: 70; opacity: 0; }
.clip-box  { clip-path: polygon(0 0, 100% 0, 100% 100%, 20px 100%); padding: 14px 32px 14px 24px; display: flex; align-items: center; gap: 14px; }
.clip-icon { font-size: 32px; line-height: 1; }
.clip-text { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
.clip-sub  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 3px; font-weight: 600; color: rgba(255,255,255,.75); text-transform: uppercase; }

/* Countdown */
.overlay-countdown { position: absolute; inset: 0; z-index: 95; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: rgba(0,0,0,0.88); opacity: 0; }
.countdown-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,.4); }
.countdown-num   { font-size: 280px; font-weight: 900; letter-spacing: -16px; line-height: 1; }
.countdown-sub   { font-size: 20px; color: rgba(255,255,255,.3); letter-spacing: 3px; }

/* Ad */
.overlay-ad { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; opacity: 0; }
.ad-badge  { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; padding: 7px 20px; border-radius: 3px; border: 1px solid; }
.ad-title  { font-size: 80px; font-weight: 900; letter-spacing: -3px; text-align: center; line-height: 1; }
.ad-title em { font-style: normal; }
.ad-sub    { font-size: 22px; font-weight: 400; color: rgba(255,255,255,.5); }
.ad-ring-wrap { position: relative; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
.ad-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.ad-ring-bg { fill: none; stroke: rgba(255,255,255,.08); stroke-width: 4; }
.ad-ring-fg { fill: none; stroke-width: 4; stroke-linecap: round; }
.ad-ring-num { font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 600; position: relative; z-index: 1; }
.ad-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; transform-origin: left; transform: scaleX(1); }
</style>
</head>
<body>
<div id="editor">
  <!-- Top bar -->
  <div id="topbar">
    <h1>Arhaval · Overlay Editor</h1>
    <div class="sep"></div>
    <span class="meta">1920 × 1080</span>
    <div class="spacer"></div>
    <button id="btn-clear">EKRANI TEMİZLE</button>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <div id="preview-label">1920 × 1080 — OBS Browser Source Önizleme</div>
    <div id="canvas-wrap">
      <div id="canvas"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Overlay tabs -->
    <div id="overlay-tabs">
      <button class="ov-tab active" data-ov="banner"    style="--tab-color:#3B82F6">Banner</button>
      <button class="ov-tab"        data-ov="alert"     style="--tab-color:#EAB308">Alert</button>
      <button class="ov-tab"        data-ov="popup"     style="--tab-color:#8B5CF6">Popup</button>
      <button class="ov-tab"        data-ov="lower"     style="--tab-color:#EC4899">Lower</button>
      <button class="ov-tab"        data-ov="hype"      style="--tab-color:#F97316">Hype</button>
      <button class="ov-tab"        data-ov="gg"        style="--tab-color:#22C55E">GG</button>
      <button class="ov-tab"        data-ov="brb"       style="--tab-color:#6B7280">BRB</button>
      <button class="ov-tab"        data-ov="score"     style="--tab-color:#EF4444">Score</button>
      <button class="ov-tab"        data-ov="clip"      style="--tab-color:#EC4899">Clip</button>
      <button class="ov-tab"        data-ov="countdown" style="--tab-color:#14B8A6">Countdown</button>
      <button class="ov-tab"        data-ov="ad"        style="--tab-color:#FF4D00">Ad</button>
    </div>

    <!-- Controls inject here -->
    <div id="controls"></div>

    <!-- Actions -->
    <div id="actions">
      <button id="btn-preview">▶  ÖNİZLE</button>
      <button id="btn-copy">{ } JSON Kopyala</button>
    </div>
  </div>
</div>

<script>
// ── GSAP setup ───────────────────────────────────────────────────────────────
CustomEase.create('bounce4', 'M0,0 C0,0 0.058,0.408 0.2,0.6 0.342,0.792 0.458,0.84 0.5,0.85 0.542,0.86 0.7,0.92 0.8,1.012 0.9,1.104 0.92,1.085 1,1');

const canvas = document.getElementById('canvas');
let currentOv = 'banner';

// ── Scale canvas to fit preview area ────────────────────────────────────────
function scaleCanvas() {
  const wrap = document.getElementById('preview-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const scaleX = W / 1920, scaleY = H / 1080;
  const scale = Math.min(scaleX, scaleY) * 0.92;
  const cw = document.getElementById('canvas-wrap');
  cw.style.transform = `scale(${scale})`;
  cw.style.left = ((W - 1920 * scale) / 2) + 'px';
  cw.style.top  = ((H - 1080 * scale) / 2) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ── Color swatches ──────────────────────────────────────────────────────────
const PALETTE = [
  { hex: '#FF4D00', name: 'Arhaval' },
  { hex: '#EF4444', name: 'Kırmızı' },
  { hex: '#F97316', name: 'Turuncu' },
  { hex: '#EAB308', name: 'Sarı' },
  { hex: '#22C55E', name: 'Yeşil' },
  { hex: '#14B8A6', name: 'Teal' },
  { hex: '#3B82F6', name: 'Mavi' },
  { hex: '#8B5CF6', name: 'Mor' },
  { hex: '#EC4899', name: 'Pembe' },
  { hex: '#FFFFFF', name: 'Beyaz' },
];

function makePalette(key, defaultColor) {
  const id = `pal_${key}`;
  const custId = `cust_${key}`;
  return `
    <div class="swatches" id="${id}">
      ${PALETTE.map(c => `
        <div class="swatch${c.hex===defaultColor?' active':''}"
          style="background:${c.hex}"
          data-color="${c.hex}"
          title="${c.name}"></div>
      `).join('')}
      <label class="swatch-custom" title="Özel renk">
        <input type="color" value="${defaultColor}" id="${custId}">
      </label>
    </div>`;
}

function bindPalette(key, onChange) {
  const wrap = document.getElementById(`pal_${key}`);
  const cust = document.getElementById(`cust_${key}`);
  wrap.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      wrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      cust.value = s.dataset.color;
      onChange(s.dataset.color);
    });
  });
  cust.addEventListener('input', (e) => {
    wrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    onChange(e.target.value);
  });
}

function makeSlider(id, label, min, max, val, unit='') {
  return `
    <div class="ctrl-group">
      <div class="ctrl-label">${label} <span id="${id}_lbl">${val}${unit}</span></div>
      <div class="slider-row">
        <input type="range" id="${id}" min="${min}" max="${max}" value="${val}">
        <span class="slider-val" id="${id}_v">${val}</span>
      </div>
    </div>`;
}

function bindSlider(id, unit, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  const lbl = document.getElementById(`${id}_lbl`);
  const v   = document.getElementById(`${id}_v`);
  el.addEventListener('input', () => {
    const val = el.value;
    if (lbl) lbl.textContent = val + unit;
    if (v)   v.textContent   = val;
    cb(Number(val));
  });
}

function makeToggle(id, options, active) {
  return `<div class="toggle-row">${options.map(o =>
    `<button class="tog-btn${o.val===active?' active':''}" data-val="${o.val}" data-group="${id}">${o.label}</button>`
  ).join('')}</div>`;
}

function bindToggle(groupId, cb) {
  document.querySelectorAll(`[data-group="${groupId}"]`).forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll(`[data-group="${groupId}"]`).forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      cb(b.dataset.val);
    });
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  banner:    { text: 'Arhaval ile CS2 izliyorsunuz!', label: 'ARHAVAL', color: '#3B82F6', textSize: 24, duration: 8, position: 'bottom' },
  alert:     { text: 'CLUTCH KAZANDI!', label: 'ARHAVAL · ALERT', icon: '⚡', color: '#EAB308', textSize: 58, duration: 4 },

// ── Render controls ──────────────────────────────────────────────────────────
function renderControls(ov) {
  const s = state[ov];
  document.getElementById('controls').innerHTML = CTRL_DEFS[ov](s);

  // Bind live updates
  const bind = (id, key, transform) => {
    const el = document.getElementById(id);
    if (!el) return;
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, () => {
      state[ov][key] = transform ? transform(el.value) : el.value;
    });
  };

  bind('c_text',      'text');
  bind('c_label',     'label');
  bind('c_title',     'title');
  bind('c_subtitle',  'subtitle');
  bind('c_badge',     'badge');
  bind('c_icon',      'icon');
  bind('c_sub',       'sub');
  bind('c_tag',       'tag');
  bind('c_name',      'name');
  bind('c_titleWord', 'titleWord');
  bind('c_team1',     'team1');
  bind('c_team2',     'team2');
  bind('c_score1',    'score1', Number);
  bind('c_score2',    'score2', Number);
  bind('c_map',       'map');

  // Sliders
  const sliders = { c_textSize:'textSize', c_nameSize:'nameSize', c_duration:'duration', c_from:'from' };
  for (const [id, key] of Object.entries(sliders)) {
    bindSlider(id, id==='c_duration'?'sn':id==='c_textSize'||id==='c_nameSize'?'px':'', val => { state[ov][key] = val; });
  }

  // Toggles
  bindToggle('c_pos', val => { state[ov].position = val; });

  // Palettes
  const palKey = ov;
  const palEl = document.getElementById(`pal_${palKey}`);
  if (palEl) bindPalette(palKey, hex => { state[ov].color = hex; });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function make(cls, html) {
  const el = document.createElement('div');
  el.className = cls; el.innerHTML = html;
  return el;
}
function kill(el, dur=0.4) {
  if (!el?.parentNode) return;
  gsap.to(el, { opacity:0, duration:dur, ease:'power2.in', onComplete: ()=>el.remove() });
}
function killClass(cls) { canvas.querySelectorAll('.'+cls).forEach(e=>kill(e)); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function applyC(el, color) {
  const rgb = hexToRgb(color);
  el.querySelectorAll('.b-dot,.b-label,.b-bar,.lower-accent-bar,.lower-tag,.p-title,.p-bar,.a-label,.clip-box,.brb-title em,.brb-dot,.brb-ring-spin,.ad-ring-fg,.ad-ring-num,.countdown-num').forEach(x => {
    if (x.classList.contains('b-dot') || x.classList.contains('lower-accent-bar') || x.classList.contains('brb-dot') || x.classList.contains('clip-box') || x.classList.contains('ad-bar') || x.classList.contains('b-bar') || x.classList.contains('p-bar')) {
      x.style.background = color;
      x.style.boxShadow  = `0 0 14px rgba(${rgb},.6)`;
    }
    if (x.classList.contains('b-label') || x.classList.contains('lower-tag') || x.classList.contains('p-title') || x.classList.contains('a-label') || x.classList.contains('ad-ring-num') || x.classList.contains('countdown-num')) {
      x.style.color = color;
      x.style.textShadow = `0 0 60px rgba(${rgb},.6)`;
    }
    if (x.classList.contains('brb-title')) {
      x.querySelector('em').style.color = color;
    }
    if (x.classList.contains('brb-ring-spin') || x.classList.contains('ad-ring-fg')) {
      x.style.stroke = color;
      x.style.filter = `drop-shadow(0 0 8px ${color})`;
    }
    if (x.classList.contains('clip-box')) {
      x.style.boxShadow = `0 8px 40px rgba(${rgb},.5)`;
    }
  });
  // Border overrides
  el.querySelectorAll('.overlay-banner').forEach(x => { x.style.borderTopColor=color; x.style.boxShadow=`0 -8px 40px rgba(${rgb},.15)`; });
  el.querySelectorAll('.overlay-popup').forEach(x  => { x.style.borderLeftColor=color; });
  el.querySelectorAll('.a-box').forEach(x          => { x.style.borderColor=color; x.style.boxShadow=`0 0 0 1px rgba(${rgb},.15),0 0 100px rgba(${rgb},.2),0 48px 96px rgba(0,0,0,.7)`; });
  el.querySelectorAll('.a-backdrop').forEach(x     => { x.style.background=`radial-gradient(ellipse at center, rgba(${rgb},.14) 0%, transparent 65%)`; });
  el.querySelectorAll('.a-shockwave').forEach(x    => { x.style.borderColor=color; });
  el.querySelectorAll('.h-text').forEach(x         => { x.style.webkitTextStroke=`4px ${color}`; });
  el.querySelectorAll('.h-text-solid,.h-bg-flash').forEach(x => { x.style.color=color; x.style.background=color; });
  el.querySelectorAll('.ad-badge').forEach(x       => { x.style.color=color; x.style.borderColor=`rgba(${rgb},.5)`; x.style.background=`rgba(${rgb},.08)`; });
  el.querySelectorAll('.ad-title em').forEach(x    => { x.style.color=color; });
  el.querySelectorAll('.ad-bar').forEach(x         => { x.style.background=color; });
  el.querySelectorAll('.brb-ring-pulse').forEach(x => { x.style.stroke=`rgba(${rgb},.18)`; });
}

function showBanner(s) {
  killClass('overlay-banner');
  const el = make('overlay-banner', `

    <div class="b-label">${s.label}</div>
    <div class="b-div"></div>
    <div class="b-text" style="font-size:${s.textSize}px">${s.text}</div>
    <div class="b-bar"></div>
  `);
  el.style.cssText += s.position==='top'
    ? 'top:0; border-bottom:2px solid; border-top:none;'
    : 'bottom:0; border-top:2px solid;';
  el.style.borderColor = s.color;
  el.style.background = `linear-gradient(90deg,rgba(0,0,0,.96) 0%,rgba(${hexToRgb(s.color)},.08) 40%,rgba(0,0,0,.96) 100%)`;
  canvas.appendChild(el);
  applyC(el, s.color);
  const dir = s.position==='top' ? '-100%' : '100%';
  gsap.set(el, { opacity:1 });
  gsap.from(el, { y:dir, duration:0.5, ease:'power3.out' });
  gsap.to(el.querySelector('.b-dot'), { opacity:0.2, duration:0.8, repeat:-1, yoyo:true, ease:'sine.inOut' });
  const bar = el.querySelector('.b-bar');
  gsap.to(bar, { scaleX:0, duration:s.duration, ease:'none', transformOrigin:'left', onComplete: ()=>{
    gsap.to(el, { y:dir, opacity:0, duration:0.5, ease:'power2.in', onComplete:()=>el.remove() });
  }});
}

function showAlert(s) {
  const el = make('overlay-alert', `

  applyC(el, s.color);
  const aBox = el.querySelector('.a-box');

  spawnParticles(el.querySelector('.a-particles'), s.color);

function spawnParticles(c, color) {
  for (let i=0;i<36;i++){
    const p=document.createElement('div'); p.className='particle';
    const size=4+Math.random()*8, angle=(Math.random()*360)*Math.PI/180, dist=120+Math.random()*260;
    p.style.cssText=`left:${45+Math.random()*10}%;top:${40+Math.random()*20}%;width:${size}px;height:${size}px;background:${Math.random()>.4?color:'#fff'};border-radius:${Math.random()>.5?'50%':'2px'};`;
    c.appendChild(p);
    gsap.fromTo(p,{opacity:1,x:0,y:0,scale:1},{opacity:0,x:Math.cos(angle)*dist,y:Math.sin(angle)*dist,scale:0,duration:0.6+Math.random()*.8,delay:Math.random()*.25,ease:'power2.out'});
  }
}

function launchConfetti(c) {
  const cols=['#FF4D00','#F5C842','#22C55E','#3B82F6','#fff','#FF6B2C','#A855F7'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    const col=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText=`left:${20+Math.random()*60}%;top:-20px;background:${col};transform:rotate(${Math.random()*360}deg);width:${8+Math.random()*10}px;height:${12+Math.random()*14}px;`;
    c.appendChild(p);
    gsap.to(p,{y:1200+Math.random()*200,x:(Math.random()-.5)*400,rotation:(Math.random()-.5)*720,opacity:[{value:1},{value:0,delay:0.8}],duration:2+Math.random()*2.5,delay:Math.random()*1.5,ease:'power1.in'});
  }
}

function showBRB(s) {
  const existing=canvas.querySelector('.overlay-brb');
  if(existing){kill(existing,0.4);return;}
  const el=make('overlay-brb',`
    <div class="brb-logo-ring">
      <svg viewBox="0 0 140 140" width="140" height="140">
        <circle class="brb-ring-pulse" cx="70" cy="70" r="60" stroke="rgba(${hexToRgb(s.color)},.18)"/>
        <circle class="brb-ring-spin"  cx="70" cy="70" r="60" stroke="${s.color}" stroke-dasharray="60 316" stroke-dashoffset="0" fill="none" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="brb-icon">⏸</div>
    </div>
    <div class="brb-title">Be <em style="color:${s.color}">${s.titleWord}</em> Back</div>
    <div class="brb-sub">${s.sub}</div>
    <div class="brb-dots">
      <div class="brb-dot" style="background:${s.color}" id="bd0"></div>
      <div class="brb-dot" style="background:${s.color}" id="bd1"></div>
      <div class="brb-dot" style="background:${s.color}" id="bd2"></div>
    </div>
  `);
  canvas.appendChild(el);
  gsap.to(el,{opacity:1,duration:0.6,ease:'power2.out'});
  gsap.from(el.querySelector('.brb-title'),{y:30,opacity:0,duration:0.7,ease:'back.out(2)',delay:0.2});
  gsap.from(el.querySelector('.brb-sub'),  {y:20,opacity:0,duration:0.5,ease:'power2.out',delay:0.4});
  const ring=el.querySelector('.brb-ring-spin');
  gsap.to(ring,{strokeDashoffset:-376,duration:2,ease:'none',repeat:-1});
  el.querySelectorAll('.brb-dot').forEach((dot,i)=>{
    gsap.to(dot,{opacity:0.2,duration:0.6,repeat:-1,yoyo:true,ease:'sine.inOut',delay:i*.25});
  });
}

function showScore(s) {
  killClass('overlay-score');
  const el=make('overlay-score',`
    <div class="score-wrap">
      <div class="score-team left">
        <div class="team-tag">CT</div>
        <div class="team-name">${s.team1}</div>
        <div class="team-score">${s.score1}</div>
      </div>
      <div class="score-mid">
        <div class="score-map-label">MAP</div>
        <div class="score-map">${s.map}</div>
        <div class="score-sep">—</div>
        <div class="score-map-label">LIVE</div>
      </div>
      <div class="score-team right">
        <div class="team-tag">T</div>
        <div class="team-name">${s.team2}</div>
        <div class="team-score">${s.score2}</div>
      </div>
    </div>
  `);
  canvas.appendChild(el);
  gsap.set(el,{opacity:0,y:-30});
  gsap.to(el,{opacity:1,y:0,duration:0.5,ease:'back.out(1.5)'});
}

function showClip(s) {
  const el=make('overlay-clip',`
    <div class="clip-box" style="background:${s.color};box-shadow:0 8px 40px rgba(${hexToRgb(s.color)},.5)">
      <div class="clip-icon">🎬</div>
      <div>
        <div class="clip-text">${s.text}</div>
        <div class="clip-sub">${s.sub}</div>
      </div>
    </div>
  `);
  el.style.cssText='position:absolute;top:0;right:0;padding:40px 56px;opacity:0;';
  canvas.appendChild(el);
  gsap.set(el,{opacity:0,x:80,y:-20});
  gsap.to(el,{opacity:1,x:0,y:0,duration:0.4,ease:'back.out(2)'});
  setTimeout(()=>{gsap.to(el,{opacity:0,x:80,y:-20,duration:0.4,ease:'power2.in',onComplete:()=>el.remove()});}, s.duration*1000);
}

function showCountdown(s) {
  const existing=canvas.querySelector('.overlay-countdown');
  if(existing){kill(existing,0.3);return;}
  const el=make('overlay-countdown',`
    <div class="countdown-label">${s.label}</div>
    <div class="countdown-num" style="color:${s.color};text-shadow:0 0 120px rgba(${hexToRgb(s.color)},.6)">${s.from}</div>
    <div class="countdown-sub">${s.sub}</div>
  `);
  canvas.appendChild(el);
  gsap.to(el,{opacity:1,duration:0.4,ease:'power2.out'});
  let rem=s.from;
  const numEl=el.querySelector('.countdown-num');
  gsap.fromTo(numEl,{scale:1.4,opacity:0.4},{scale:1,opacity:1,duration:0.35,ease:'back.out(2)'});
  const iv=setInterval(()=>{
    rem--;
    if(!el.parentNode){clearInterval(iv);return;}
    if(rem<=0){
      clearInterval(iv);
      numEl.textContent='GİT!';
      numEl.style.color='#22C55E';
      numEl.style.textShadow='0 0 120px rgba(34,197,94,.7)';
      gsap.fromTo(numEl,{scale:1.6,opacity:0},{scale:1,opacity:1,duration:0.5,ease:'back.out(2)'});
      setTimeout(()=>kill(el,0.6),1800);
    } else {
      numEl.textContent=rem;
      gsap.fromTo(numEl,{scale:1.4,opacity:0.4},{scale:1,opacity:1,duration:0.3,ease:'back.out(2)'});
    }
  },1000);
}

function showAd(s) {
  const circ=282;
  const el=make('overlay-ad',`
    <div class="ad-badge">${s.badge}</div>
    <div class="ad-title">${s.title.replace(/(\S+)$/,'<em>$1</em>')}</div>
    <div class="ad-sub">${s.subtitle}</div>
    <div class="ad-ring-wrap">
      <svg viewBox="0 0 100 100" width="110" height="110">
        <circle class="ad-ring-bg" cx="50" cy="50" r="45"/>
        <circle class="ad-ring-fg" cx="50" cy="50" r="45" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
      </svg>
      <div class="ad-ring-num">${s.duration}</div>
    </div>
    <div class="ad-bar"></div>
  `);
  canvas.appendChild(el);
  applyC(el, s.color);
  const adBadge   = el.querySelector('.ad-badge');
  const adTitle   = el.querySelector('.ad-title');
  const adSub     = el.querySelector('.ad-sub');
  const adRingWrap= el.querySelector('.ad-ring-wrap');
  const adBar     = el.querySelector('.ad-bar');
  const ring      = el.querySelector('.ad-ring-fg');
  const num       = el.querySelector('.ad-ring-num');
  const tl=gsap.timeline();
  tl.to(el,{opacity:1,duration:0.5,ease:'power2.out'})
    .from(adBadge,   {y:20,opacity:0,duration:0.5,ease:'power3.out'},0.1)
    .from(adTitle,   {y:40,opacity:0,duration:0.6,ease:'bounce4'},0.2)
    .from(adSub,     {y:20,opacity:0,duration:0.5,ease:'power3.out'},0.35)
    .from(adRingWrap,{scale:0.5,opacity:0,duration:0.6,ease:'back.out(2)'},0.4);
  gsap.to(adBar,{scaleX:0,duration:s.duration,ease:'none',transformOrigin:'left'});
  let rem=s.duration;
  const iv=setInterval(()=>{
    rem--; if(num) num.textContent=rem;
    if(ring) ring.style.strokeDashoffset=circ*(1-rem/s.duration);
    if(rem<=0){clearInterval(iv);kill(el,0.6);}
  },1000);
}

// ── Preview button ─────────────────────────────────────────────────────────────
const SHOW_FNS = { banner:showBanner, alert:showAlert, popup:showPopup, lower:showLower, hype:showHype, gg:showGG, brb:showBRB, score:showScore, clip:showClip, countdown:showCountdown, ad:showAd };

document.getElementById('btn-preview').addEventListener('click', () => {
  const fn = SHOW_FNS[currentOv];
  if (fn) fn(state[currentOv]);
});

// ── Copy JSON ─────────────────────────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', () => {
  const data = JSON.stringify(state[currentOv], null, 2);
  navigator.clipboard.writeText(data).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Kopyalandı!';
    setTimeout(() => btn.textContent='{ } JSON Kopyala', 2000);
  });
});
</script>
</body>
</html>
