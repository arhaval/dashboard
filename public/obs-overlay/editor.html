<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arhaval Overlay Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080808; color: #fff; font-family: 'IBM Plex Mono', monospace; overflow: hidden; }

#editor {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* top bar */
#topbar {
  grid-column: 1 / -1;
  background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
}
#topbar h1 { font-family: 'Barlow Condensed', monospace; font-size: 14px; font-weight: 700; color: #FF4D00; letter-spacing: 3px; text-transform: uppercase; }
#topbar .sep { width: 1px; height: 20px; background: #222; }
#topbar .meta { font-size: 11px; color: #444; }
#topbar .spacer { flex: 1; }
#btn-clear { font-size: 10px; padding: 5px 14px; border-radius: 3px; background: transparent; border: 1px solid #222; color: #555; cursor: pointer; font-family: inherit; letter-spacing: 2px; transition: all .15s; text-transform: uppercase; }
#btn-clear:hover { border-color: #444; color: #aaa; }

/* preview */
#preview-wrap {
  position: relative; overflow: hidden; background: #050507;
  background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 48px 48px;
}
#preview-label { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #222; letter-spacing: 3px; pointer-events: none; z-index: 999; text-transform: uppercase; }
#canvas-wrap { position: absolute; transform-origin: top left; }
#canvas { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: transparent; }
#canvas-wrap::after { content: ''; position: absolute; inset: 0; border: 1px solid #1a1a1a; pointer-events: none; }

/* sidebar */
#sidebar { background: #0d0d0d; border-left: 1px solid #1a1a1a; overflow-y: auto; display: flex; flex-direction: column; }
#overlay-tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; border-bottom: 1px solid #1a1a1a; }
.ov-tab { font-size: 10px; padding: 5px 10px; border-radius: 3px; cursor: pointer; background: #111; border: 1px solid #1e1e1e; color: #555; font-family: 'IBM Plex Mono', monospace; letter-spacing: .5px; transition: all .15s; text-transform: uppercase; }
.ov-tab:hover { color: #aaa; border-color: #333; }
.ov-tab.active { color: #fff; border-color: var(--tab-color, #FF4D00); background: color-mix(in srgb, var(--tab-color, #FF4D00) 10%, transparent); }

#controls { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-label { font-size: 9px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
.ctrl-label span { color: #333; }
input[type="text"], input[type="number"], textarea, select { background: #0a0a0a; border: 1px solid #1e1e1e; color: #ccc; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 7px 10px; border-radius: 3px; width: 100%; outline: none; resize: none; transition: border-color .15s; }
input:focus, textarea:focus, select:focus { border-color: #333; }
select option { background: #0d0d0d; }

.swatches { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.swatch { width: 24px; height: 24px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: all .1s; flex-shrink: 0; }
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: #fff; }
.swatch-custom { width: 24px; height: 24px; border-radius: 3px; cursor: pointer; border: 1px solid #2a2a2a; overflow: hidden; flex-shrink: 0; }
.swatch-custom input[type="color"] { width: 36px; height: 36px; margin: -6px; border: none; padding: 0; cursor: pointer; background: none; }

.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type="range"] { flex: 1; accent-color: #FF4D00; height: 4px; padding: 0; background: none; border: none; cursor: pointer; }
.slider-val { font-size: 11px; color: #555; min-width: 32px; text-align: right; }

.toggle-row { display: flex; gap: 6px; }
.tog-btn { flex: 1; padding: 6px; font-size: 9px; border-radius: 3px; cursor: pointer; background: #111; border: 1px solid #1e1e1e; color: #444; font-family: 'IBM Plex Mono', monospace; letter-spacing: .5px; text-align: center; transition: all .15s; text-transform: uppercase; }
.tog-btn:hover { color: #aaa; }
.tog-btn.active { background: #141414; border-color: #FF4D00; color: #FF4D00; }

#actions { padding: 12px; border-top: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 8px; }
#btn-preview { padding: 12px; border-radius: 3px; font-size: 14px; font-weight: 700; background: #FF4D00; border: none; color: #fff; cursor: pointer; font-family: 'Barlow Condensed', monospace; letter-spacing: 3px; text-transform: uppercase; transition: background .15s; }
#btn-preview:hover { background: #FF6B2C; }
#btn-copy { padding: 8px; border-radius: 3px; font-size: 10px; background: transparent; border: 1px solid #1e1e1e; color: #444; cursor: pointer; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; transition: all .15s; }
#btn-copy:hover { border-color: #333; color: #aaa; }

/* ═══════════════════════════════════════════════════════
   CANVAS CSS — mirrors index.html exactly
═══════════════════════════════════════════════════════ */
#canvas {
  --acc: #FF4D00; --acc2: #FF6B2C; --acc-glow: rgba(255,77,0,0.55);
  --acc-dim: rgba(255,77,0,0.12); --ct: #4D8BFF; --t: #FF8C00;
  --gold: #FFD060; --green: #00E5A0; --dark: #07070E;
  --surface: rgba(8,8,16,0.97); --border: rgba(255,255,255,0.07);
  --text: #FFFFFF; --sub: rgba(255,255,255,0.5); --muted: rgba(255,255,255,0.22);
  --f-display: 'Barlow Condensed', system-ui;
  --f-ui: 'Rajdhani', system-ui;
  --f-mono: 'IBM Plex Mono', monospace;
  font-family: var(--f-ui); color: var(--text); -webkit-font-smoothing: antialiased;
}

/* atmospheric layers */
#canvas .atm-rays {
  position: absolute; width: 2200px; height: 2200px; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, transparent 11deg, rgba(255,77,0,0.018) 11deg, rgba(255,77,0,0.018) 15deg, transparent 15deg, transparent 26deg);
  animation: raySpin 80s linear infinite; pointer-events: none;
}
@keyframes raySpin { to { transform: translate(-50%,-50%) rotate(360deg); } }
#canvas .atm-glow {
  position: absolute; width: 900px; height: 900px; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, rgba(255,77,0,0.10) 0%, rgba(255,77,0,0.03) 45%, transparent 70%);
  animation: glowPulse 4s ease-in-out infinite; pointer-events: none;
}
@keyframes glowPulse { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);} 50%{opacity:.6;transform:translate(-50%,-50%) scale(1.18);} }
#canvas .atm-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 35%, rgba(0,0,0,.75) 100%); pointer-events: none; }
#canvas .atm-scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,.07) 3px, rgba(0,0,0,.07) 4px); pointer-events: none; z-index: 10; }
@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(255,77,0,0.45)) drop-shadow(0 0 70px rgba(255,77,0,0.18)); }
  50%     { filter: drop-shadow(0 0 48px rgba(255,77,0,0.85)) drop-shadow(0 0 130px rgba(255,77,0,0.40)); }
}
@keyframes blink { to { opacity: .2; } }

/* 1. Banner */
#canvas .overlay-banner { position:absolute; bottom:0; left:0; right:0; height:80px; z-index:50; display:flex; align-items:stretch; background:linear-gradient(90deg,#08101E 0%,#0C1424 55%,#090E1A 100%); border-top:3px solid var(--acc); clip-path:inset(0 0 100% 0); }
#canvas .bn-badge { background:var(--acc); clip-path:polygon(0 0,calc(100% - 30px) 0,100% 100%,0 100%); padding:0 60px 0 36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; min-width:140px; position:relative; }
#canvas .bn-badge::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:rgba(255,255,255,.22); pointer-events:none; }
#canvas .bn-badge img { height:48px; width:auto; object-fit:contain; filter:brightness(0) invert(1); }
#canvas .bn-sep { width:1px; background:rgba(255,255,255,.08); flex-shrink:0; }
#canvas .bn-body { flex:1; display:flex; align-items:center; padding:0 44px; gap:0; overflow:hidden; clip-path:inset(0 100% 0 0); flex-direction:column; justify-content:center; }
#canvas .bn-label { font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:var(--acc); white-space:nowrap; line-height:1; margin-bottom:5px; }
#canvas .bn-text { font-family:var(--f-display); font-size:36px; font-weight:800; letter-spacing:.5px; white-space:nowrap; overflow:hidden; line-height:1; color:#fff; text-shadow:0 1px 12px rgba(0,0,0,.5); }
#canvas .bn-right { display:flex; align-items:center; gap:10px; padding:0 36px; flex-shrink:0; clip-path:inset(0 100% 0 0); border-left:1px solid rgba(255,255,255,.07); }
#canvas .bn-live-label { font-family:var(--f-mono); font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,.38); }
#canvas .bn-live-dot { width:7px; height:7px; border-radius:50%; background:var(--acc); box-shadow:0 0 6px rgba(255,77,0,.8); animation:bnDot 1.6s ease-in-out infinite; }
@keyframes bnDot { 0%,100%{opacity:1} 50%{opacity:.2} }
#canvas .bn-bar { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,.05); }
#canvas .bn-bar-fill { height:100%; width:100%; background:var(--acc); transform-origin:left; }

/* 2. Lower Third */
#canvas .overlay-lower { position:absolute; bottom:80px; left:0; opacity:0; z-index:50; display:flex; flex-direction:column; }
#canvas .lt-tag-row { display:flex; align-items:center; width:fit-content; }
#canvas .lt-logo-box { background:var(--acc); width:42px; height:28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
#canvas .lt-logo-box img { height:18px; width:auto; object-fit:contain; filter:brightness(0) invert(1); }
#canvas .lt-tag-wrap { background:rgba(255,77,0,.85); clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%); padding:5px 24px 5px 12px; }
#canvas .lt-tag { font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:#fff; }
#canvas .lt-main { display:flex; align-items:center; background:var(--surface); border-top:2px solid var(--acc); border-left:2px solid var(--acc); clip-path:polygon(0 0,calc(100% - 28px) 0,100% 50%,calc(100% - 28px) 100%,0 100%); padding:11px 56px 11px 22px; gap:20px; }
#canvas .lt-name { font-family:var(--f-display); font-size:44px; font-weight:800; letter-spacing:-.5px; line-height:1; white-space:nowrap; }
#canvas .lt-divider { width:2px; height:32px; background:var(--acc); flex-shrink:0; }
#canvas .lt-sub { font-family:var(--f-ui); font-size:18px; font-weight:500; color:var(--sub); white-space:nowrap; }

/* 3. Popup */
#canvas .overlay-popup { position:absolute; bottom:100px; right:48px; width:420px; z-index:60; opacity:0; background:var(--surface); border:1px solid var(--border); clip-path:polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%); }
#canvas .pop-accent { height:3px; background:var(--acc); box-shadow:0 0 16px var(--acc-glow); }
#canvas .pop-body { padding:18px 22px 20px; }
#canvas .pop-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
#canvas .pop-icon { font-size:22px; line-height:1; }
#canvas .pop-title { font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--acc); }
#canvas .pop-text { font-family:var(--f-display); font-size:22px; font-weight:600; line-height:1.4; color:var(--text); }
#canvas .pop-timer { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,.08); overflow:hidden; }
#canvas .pop-timer-bar { height:100%; background:var(--acc); transform-origin:left; }

/* 4. Alert */
#canvas .overlay-alert { position:absolute; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; opacity:0; }
#canvas .al-backdrop { position:absolute; inset:0; }
#canvas .al-ring { position:absolute; border-radius:50%; border:1px solid; opacity:0; pointer-events:none; }
#canvas .al-box { position:relative; z-index:2; background:var(--surface); border:1px solid rgba(255,77,0,.4); clip-path:polygon(20px 0,100% 0,calc(100% - 20px) 100%,0 100%); padding:48px 100px; text-align:center; opacity:0; box-shadow:0 0 80px rgba(255,77,0,.15),0 40px 80px rgba(0,0,0,.8); }
#canvas .al-box::before { content:''; position:absolute; top:-1px; left:19px; width:20px; height:20px; border-top:2px solid var(--acc); border-left:2px solid var(--acc); }
#canvas .al-box::after  { content:''; position:absolute; bottom:-1px; right:19px; width:20px; height:20px; border-bottom:2px solid var(--acc); border-right:2px solid var(--acc); }
#canvas .al-eyebrow { font-family:var(--f-mono); font-size:11px; font-weight:600; letter-spacing:6px; text-transform:uppercase; color:var(--acc); margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:12px; }
#canvas .al-eyebrow::before, #canvas .al-eyebrow::after { content:''; flex:1; max-width:80px; height:1px; background:rgba(255,77,0,.4); }
#canvas .al-text { font-family:var(--f-display); font-size:72px; font-weight:900; letter-spacing:-1px; line-height:1; }
#canvas .al-particles { position:absolute; inset:-60px; pointer-events:none; }
#canvas .al-particle  { position:absolute; opacity:0; }

/* 5. Hype */
#canvas .overlay-hype { position:absolute; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; opacity:0; overflow:hidden; }
#canvas .hy-flash { position:absolute; inset:0; opacity:0; }
#canvas .hy-lines { position:absolute; inset:0; opacity:0; }
#canvas .hy-lines line { stroke-width:1; }
#canvas .hy-text { font-family:var(--f-display); font-size:240px; font-weight:900; letter-spacing:-12px; text-transform:uppercase; color:transparent; -webkit-text-stroke:3px var(--acc); line-height:1; position:relative; z-index:2; opacity:0; }
#canvas .hy-glow { position:absolute; font-family:var(--f-display); font-size:240px; font-weight:900; letter-spacing:-12px; text-transform:uppercase; opacity:0; filter:blur(60px); line-height:1; }

/* 6. GG */
#canvas .overlay-gg { position:absolute; inset:0; z-index:80; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; overflow:hidden; }
#canvas .gg-confetti { position:absolute; inset:0; pointer-events:none; }
#canvas .gg-piece    { position:absolute; opacity:0; }
#canvas .gg-eyebrow  { font-family:var(--f-mono); font-size:12px; font-weight:600; letter-spacing:10px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; opacity:0; }
#canvas .gg-text     { font-family:var(--f-display); font-size:220px; font-weight:900; letter-spacing:-12px; line-height:.9; color:var(--gold); text-shadow:0 0 120px rgba(255,208,96,.5); opacity:0; }
#canvas .gg-sub      { font-family:var(--f-mono); font-size:14px; font-weight:600; letter-spacing:6px; text-transform:uppercase; color:var(--muted); margin-top:12px; opacity:0; }

/* 7. BRB */
#canvas .overlay-brb { position:absolute; inset:0; z-index:100; opacity:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; }
#canvas .brb-content { display:flex; flex-direction:column; align-items:center; gap:0; position:relative; z-index:20; }
#canvas .brb-logo-img { width:180px; height:180px; object-fit:contain; animation:logoPulse 3.5s ease-in-out infinite; display:block; }
#canvas .brb-brand { font-family:var(--f-display); font-size:88px; font-weight:900; letter-spacing:18px; text-transform:uppercase; color:#fff; margin-top:12px; line-height:1; }
#canvas .brb-rule { display:flex; align-items:center; gap:20px; width:480px; margin:24px 0 20px; }
#canvas .brb-rule-line { flex:1; height:1px; background:rgba(255,77,0,.35); }
#canvas .brb-rule-dot  { width:7px; height:7px; border-radius:50%; background:var(--acc); box-shadow:0 0 12px var(--acc); flex-shrink:0; }
#canvas .brb-status { font-family:var(--f-mono); font-size:12px; font-weight:600; letter-spacing:9px; text-transform:uppercase; color:var(--sub); }
#canvas .brb-sub-text { font-family:var(--f-mono); font-size:11px; font-weight:400; letter-spacing:3px; color:var(--muted); margin-top:10px; }
#canvas .brb-dots { display:flex; gap:12px; margin-top:44px; }
#canvas .brb-dot  { width:6px; height:6px; border-radius:50%; background:var(--acc); opacity:.25; }
#canvas .brb-bottom { position:absolute; bottom:0; left:0; right:0; height:54px; background:rgba(255,77,0,.05); border-top:1px solid rgba(255,77,0,.18); display:flex; align-items:center; gap:14px; padding:0 44px; z-index:20; }
#canvas .brb-bottom::before { content:''; position:absolute; top:-2px; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--acc) 25%,var(--acc) 75%,transparent); box-shadow:0 0 24px var(--acc-glow); }
#canvas .brb-bottom-logo { width:26px; height:26px; object-fit:contain; filter:drop-shadow(0 0 6px var(--acc-glow)); }
#canvas .brb-bottom-name { font-family:var(--f-display); font-size:17px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.75); }
#canvas .brb-bottom-spacer { flex:1; }
#canvas .brb-bottom-url { font-family:var(--f-mono); font-size:11px; color:rgba(255,255,255,.28); letter-spacing:2px; }

/* 8. Score */
#canvas .overlay-score { position:absolute; top:28px; left:50%; transform:translateX(-50%); z-index:60; opacity:0; }
#canvas .sc-wrap { display:flex; align-items:stretch; background:rgba(7,7,14,.97); border:1px solid rgba(255,255,255,.07); box-shadow:0 8px 40px rgba(0,0,0,.8); overflow:hidden; }
#canvas .sc-team { padding:14px 28px; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:200px; position:relative; }
#canvas .sc-team.ct { background:rgba(77,139,255,.06); border-right:1px solid rgba(77,139,255,.15); }
#canvas .sc-team.t  { background:rgba(255,140,0,.06);  border-left:1px solid rgba(255,140,0,.15); }
#canvas .sc-team.ct::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--ct); }
#canvas .sc-team.t::before  { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--t); }
#canvas .sc-side { font-family:var(--f-mono); font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; }
#canvas .sc-team.ct .sc-side { color:var(--ct); }
#canvas .sc-team.t  .sc-side { color:var(--t); }
#canvas .sc-name { font-family:var(--f-display); font-size:20px; font-weight:800; letter-spacing:1px; text-transform:uppercase; text-align:center; }
#canvas .sc-score { font-family:var(--f-mono); font-size:52px; font-weight:600; line-height:1; letter-spacing:-2px; }
#canvas .sc-team.ct .sc-score { color:var(--ct); text-shadow:0 0 30px rgba(77,139,255,.4); }
#canvas .sc-team.t  .sc-score { color:var(--t);  text-shadow:0 0 30px rgba(255,140,0,.4); }
#canvas .sc-mid { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:14px 22px; gap:2px; border-left:1px solid rgba(255,255,255,.05); border-right:1px solid rgba(255,255,255,.05); }
#canvas .sc-map  { font-family:var(--f-display); font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.7); }
#canvas .sc-live { font-family:var(--f-mono); font-size:9px; font-weight:600; letter-spacing:3px; color:var(--acc); text-transform:uppercase; display:flex; align-items:center; gap:5px; }
#canvas .sc-live-dot { width:5px; height:5px; border-radius:50%; background:var(--acc); box-shadow:0 0 6px var(--acc); }

/* 9. Clip */
#canvas .overlay-clip { position:absolute; top:36px; right:48px; z-index:70; opacity:0; }
#canvas .cl-wrap { display:flex; align-items:center; gap:0; filter:drop-shadow(0 8px 32px rgba(255,77,0,.5)); }
#canvas .cl-icon-box { background:var(--acc); width:72px; height:72px; display:flex; align-items:center; justify-content:center; clip-path:polygon(0 0,100% 0,calc(100% - 16px) 100%,0 100%); font-size:30px; padding-right:12px; }
#canvas .cl-text-box { background:rgba(7,7,14,.97); border:1px solid rgba(255,77,0,.4); border-left:none; padding:14px 32px 14px 20px; clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%); }
#canvas .cl-label { font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:3px; color:var(--acc); text-transform:uppercase; }
#canvas .cl-main  { font-family:var(--f-display); font-size:26px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#fff; line-height:1; }

/* 10. Countdown */
#canvas .overlay-countdown { position:absolute; inset:0; z-index:95; opacity:0; background:rgba(7,7,14,.95); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; overflow:hidden; }
#canvas .cd-bg { position:absolute; inset:0; background:radial-gradient(ellipse 50% 60% at 50% 50%,rgba(255,77,0,.06) 0%,transparent 70%); }
#canvas .cd-eyebrow { font-family:var(--f-mono); font-size:11px; font-weight:600; letter-spacing:8px; text-transform:uppercase; color:var(--muted); position:relative; }
#canvas .cd-ring-wrap { position:relative; width:300px; height:300px; display:flex; align-items:center; justify-content:center; }
#canvas .cd-ring-wrap svg { position:absolute; inset:0; transform:rotate(-90deg); }
#canvas .cd-ring-bg { fill:none; stroke:rgba(255,255,255,.04); stroke-width:3; }
#canvas .cd-ring-fg { fill:none; stroke:var(--acc); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 10px var(--acc)); }
#canvas .cd-num { font-family:var(--f-display); font-size:200px; font-weight:900; letter-spacing:-10px; line-height:1; color:var(--acc); text-shadow:0 0 100px rgba(255,77,0,.4); position:relative; z-index:1; }
#canvas .cd-sub { font-family:var(--f-mono); font-size:13px; font-weight:600; letter-spacing:6px; text-transform:uppercase; color:var(--muted); position:relative; }

/* 11. Ad */
#canvas .overlay-ad { position:absolute; inset:0; z-index:100; opacity:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; overflow:hidden; }
#canvas .ad-top-line { position:absolute; top:0; left:0; right:0; height:3px; box-shadow:0 0 32px var(--acc-glow); z-index:20; }
#canvas .ad-progress { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,77,0,.15); z-index:20; }
#canvas .ad-progress-fill { height:100%; width:100%; background:var(--acc); transform-origin:left; }
#canvas .ad-badge { display:flex; align-items:center; gap:10px; font-family:var(--f-mono); font-size:11px; font-weight:600; letter-spacing:6px; text-transform:uppercase; border:1px solid; padding:9px 32px; clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%); position:relative; z-index:20; }
#canvas .ad-badge-dot { width:7px; height:7px; border-radius:50%; animation:blink .8s ease-in-out infinite alternate; }
#canvas .ad-logo-img { width:160px; height:160px; object-fit:contain; animation:logoPulse 3.5s ease-in-out infinite; position:relative; z-index:20; }
#canvas .ad-brand { font-family:var(--f-display); font-size:72px; font-weight:900; letter-spacing:14px; text-transform:uppercase; color:#fff; position:relative; z-index:20; margin-top:-4px; }
#canvas .ad-sub { font-family:var(--f-mono); font-size:13px; font-weight:400; color:var(--muted); letter-spacing:4px; text-transform:uppercase; position:relative; z-index:20; }
#canvas .ad-ring-wrap { position:relative; width:110px; height:110px; display:flex; align-items:center; justify-content:center; z-index:20; }
#canvas .ad-ring-wrap svg { position:absolute; inset:0; transform:rotate(-90deg); }
#canvas .ad-ring-bg { fill:none; stroke:rgba(255,255,255,.05); stroke-width:4; }
#canvas .ad-ring-fg { fill:none; stroke:var(--acc); stroke-width:4; stroke-linecap:round; filter:drop-shadow(0 0 8px var(--acc)); }
#canvas .ad-ring-num { font-family:var(--f-mono); font-size:36px; font-weight:600; color:var(--acc); position:relative; z-index:1; }
</style>
</head>
<body>
<div id="editor">
  <div id="topbar">
    <h1>Arhaval · Overlay Editor</h1>
    <div class="sep"></div>
    <span class="meta">1920 × 1080</span>
    <div class="spacer"></div>
    <button id="btn-clear">Ekranı Temizle</button>
  </div>

  <div id="preview-wrap">
    <div id="preview-label">1920 × 1080 — OBS Browser Source Önizleme</div>
    <div id="canvas-wrap"><div id="canvas"></div></div>
  </div>

  <div id="sidebar">
    <div id="overlay-tabs">
      <button class="ov-tab active" data-ov="brb"       style="--tab-color:#FF4D00">BRB</button>
      <button class="ov-tab"        data-ov="ad"        style="--tab-color:#FF4D00">Ad Break</button>
      <button class="ov-tab"        data-ov="banner"    style="--tab-color:#3B82F6">Banner</button>
      <button class="ov-tab"        data-ov="lower"     style="--tab-color:#EC4899">Lower</button>
      <button class="ov-tab"        data-ov="popup"     style="--tab-color:#8B5CF6">Popup</button>
      <button class="ov-tab"        data-ov="alert"     style="--tab-color:#EAB308">Alert</button>
      <button class="ov-tab"        data-ov="hype"      style="--tab-color:#F97316">Hype</button>
      <button class="ov-tab"        data-ov="gg"        style="--tab-color:#FFD060">GG</button>
      <button class="ov-tab"        data-ov="score"     style="--tab-color:#4D8BFF">Score</button>
      <button class="ov-tab"        data-ov="clip"      style="--tab-color:#FF4D00">Clip</button>
      <button class="ov-tab"        data-ov="countdown" style="--tab-color:#14B8A6">Countdown</button>
    </div>
    <div id="controls"></div>
    <div id="actions">
      <button id="btn-preview">▶  ÖNİZLE</button>
      <button id="btn-copy">{ } JSON Kopyala</button>
    </div>
  </div>
</div>

<script>
CustomEase.create('snap','M0,0 C0.4,0 0.7,0.6 1,1');
const canvas = document.getElementById('canvas');
let currentOv = 'brb';

function scaleCanvas() {
  const wrap = document.getElementById('preview-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const scale = Math.min(W/1920, H/1080) * 0.92;
  const cw = document.getElementById('canvas-wrap');
  cw.style.transform = `scale(${scale})`;
  cw.style.left = ((W - 1920*scale)/2) + 'px';
  cw.style.top  = ((H - 1080*scale)/2) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

const PALETTE = [
  {hex:'#FF4D00',name:'Arhaval'},{hex:'#EF4444',name:'Kırmızı'},{hex:'#F97316',name:'Turuncu'},
  {hex:'#EAB308',name:'Sarı'},{hex:'#FFD060',name:'Gold'},{hex:'#22C55E',name:'Yeşil'},
  {hex:'#00E5A0',name:'Mint'},{hex:'#14B8A6',name:'Teal'},{hex:'#4D8BFF',name:'CT Mavi'},
  {hex:'#FF8C00',name:'T Turuncu'},{hex:'#8B5CF6',name:'Mor'},{hex:'#EC4899',name:'Pembe'},{hex:'#FFFFFF',name:'Beyaz'},
];

function makePalette(key, def) {
  return `<div class="swatches" id="pal_${key}">
    ${PALETTE.map(c=>`<div class="swatch${c.hex===def?' active':''}" style="background:${c.hex}" data-color="${c.hex}" title="${c.name}"></div>`).join('')}
    <label class="swatch-custom"><input type="color" value="${def}" id="cust_${key}"></label>
  </div>`;
}
function bindPalette(key, cb) {
  const wrap=document.getElementById(`pal_${key}`), cust=document.getElementById(`cust_${key}`);
  if(!wrap||!cust) return;
  wrap.querySelectorAll('.swatch').forEach(s=>{
    s.addEventListener('click',()=>{wrap.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active')); s.classList.add('active'); cust.value=s.dataset.color; cb(s.dataset.color);});
  });
  cust.addEventListener('input',e=>{wrap.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active')); cb(e.target.value);});
}
function makeSlider(id,label,min,max,val,unit='') {
  return `<div class="ctrl-group"><div class="ctrl-label">${label} <span id="${id}_lbl">${val}${unit}</span></div>
    <div class="slider-row"><input type="range" id="${id}" min="${min}" max="${max}" value="${val}"><span class="slider-val" id="${id}_v">${val}</span></div></div>`;
}
function bindSlider(id,unit,cb) {
  const el=document.getElementById(id); if(!el) return;
  const lbl=document.getElementById(`${id}_lbl`), v=document.getElementById(`${id}_v`);
  el.addEventListener('input',()=>{ const val=el.value; if(lbl)lbl.textContent=val+unit; if(v)v.textContent=val; cb(Number(val)); });
}

const state = {
  brb:       { sub:'Hemen Geri Dönüyorum', color:'#FF4D00', url:'arhaval.com' },
  ad:        { duration:15, title:'Arhaval', subtitle:'İzlediğin için teşekkürler!', badge:'REKLAM ARASI', color:'#FF4D00' },
  banner:    { text:'Arhaval CS2 Turnuva Yayını', label:'CANLI', color:'#FF4D00', duration:12, messages:null },
  lower:     { name:'Arhaval', sub:'CS2 · Turnuva Yayını', tag:'YAYINCI', color:'#FF4D00', duration:6 },
  popup:     { text:'Yeni izleyici katıldı!', title:'HOŞGELDİN', icon:'👋', color:'#FF4D00', duration:6 },
  alert:     { text:'CLUTCH!', label:'ARHAVAL · ALERT', color:'#FF4D00', duration:4 },
  hype:      { text:'HYPE!', color:'#FF4D00', duration:3 },
  gg:        { label:'MATCH OVER', sub:'Good game · Well played', duration:6 },
  score:     { team1:'ARHAVAL', team2:'RIVAL', score1:14, score2:11, map:'MIRAGE' },
  clip:      { text:'CLIP IT!', sub:'Anı kaydet', color:'#FF4D00', duration:3 },
  countdown: { from:5, label:'Maç Başlıyor', sub:'ARHAVAL', color:'#FF4D00' },
};

const CTRL_DEFS = {
  brb: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Alt Metin</div><input type="text" id="c_sub" value="${s.sub}"></div>
    <div class="ctrl-group"><div class="ctrl-label">URL <span>(alt bar)</span></div><input type="text" id="c_url" value="${s.url}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('brb',s.color)}</div>`,
  ad: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Başlık</div><input type="text" id="c_title" value="${s.title}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Alt Yazı</div><input type="text" id="c_subtitle" value="${s.subtitle}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Rozet</div><input type="text" id="c_badge" value="${s.badge}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('ad',s.color)}</div>
    ${makeSlider('c_duration','Süre',5,60,s.duration,'sn')}`,
  banner: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Etiket</div><input type="text" id="c_label" value="${s.label}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Metin</div><textarea id="c_text" rows="2">${s.text}</textarea></div>
    <div class="ctrl-group"><div class="ctrl-label">Çoklu Mesaj <span>(her satır: ETİKET | Metin)</span></div><textarea id="c_messages" rows="4" placeholder="CANLI | Arhaval CS2 Turnuva Yayını\nSKOR | ARHAVAL 14 · 11 RIVAL\nDUYURU | Sonraki maç Pazartesi 20:00"></textarea></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('banner',s.color)}</div>
    ${makeSlider('c_duration','Süre',4,60,s.duration,'sn')}`,
  lower: s=>`
    <div class="ctrl-group"><div class="ctrl-label">İsim</div><input type="text" id="c_name" value="${s.name}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Alt Başlık</div><input type="text" id="c_sub" value="${s.sub}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Etiket</div><input type="text" id="c_tag" value="${s.tag}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('lower',s.color)}</div>
    ${makeSlider('c_duration','Süre',2,20,s.duration,'sn')}`,
  popup: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Metin</div><textarea id="c_text" rows="2">${s.text}</textarea></div>
    <div class="ctrl-group"><div class="ctrl-label">Başlık</div><input type="text" id="c_title" value="${s.title}"></div>
    <div class="ctrl-group"><div class="ctrl-label">İkon</div><input type="text" id="c_icon" value="${s.icon}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('popup',s.color)}</div>
    ${makeSlider('c_duration','Süre',2,20,s.duration,'sn')}`,
  alert: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Ana Metin</div><textarea id="c_text" rows="2">${s.text}</textarea></div>
    <div class="ctrl-group"><div class="ctrl-label">Üst Etiket</div><input type="text" id="c_label" value="${s.label}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('alert',s.color)}</div>
    ${makeSlider('c_duration','Süre',1,12,s.duration,'sn')}`,
  hype: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Metin</div><input type="text" id="c_text" value="${s.text}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('hype',s.color)}</div>
    ${makeSlider('c_duration','Süre',1,8,s.duration,'sn')}`,
  gg: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Üst Etiket</div><input type="text" id="c_label" value="${s.label}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Alt Metin</div><input type="text" id="c_sub" value="${s.sub}"></div>
    ${makeSlider('c_duration','Süre',2,12,s.duration,'sn')}`,
  score: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Takım 1 (CT)</div><input type="text" id="c_team1" value="${s.team1}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Skor 1</div><input type="number" id="c_score1" value="${s.score1}" min="0" max="30"></div>
    <div class="ctrl-group"><div class="ctrl-label">Takım 2 (T)</div><input type="text" id="c_team2" value="${s.team2}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Skor 2</div><input type="number" id="c_score2" value="${s.score2}" min="0" max="30"></div>
    <div class="ctrl-group"><div class="ctrl-label">Harita</div>
      <select id="c_map">${['MIRAGE','INFERNO','DUST2','NUKE','ANCIENT','ANUBIS','VERTIGO','TRAIN','OVERPASS','CACHE'].map(m=>`<option${m===s.map?' selected':''}>${m}</option>`).join('')}</select></div>`,
  clip: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Metin</div><input type="text" id="c_text" value="${s.text}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Alt Metin</div><input type="text" id="c_sub" value="${s.sub}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('clip',s.color)}</div>
    ${makeSlider('c_duration','Süre',1,8,s.duration,'sn')}`,
  countdown: s=>`
    <div class="ctrl-group"><div class="ctrl-label">Üst Etiket</div><input type="text" id="c_label" value="${s.label}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Alt Metin</div><input type="text" id="c_sub" value="${s.sub}"></div>
    <div class="ctrl-group"><div class="ctrl-label">Renk</div>${makePalette('countdown',s.color)}</div>
    ${makeSlider('c_from','Başlangıç',3,30,s.from,'')}`,
};

function renderControls(ov) {
  document.getElementById('controls').innerHTML = CTRL_DEFS[ov](state[ov]);
  const bind=(id,key,t)=>{ const el=document.getElementById(id); if(!el) return; el.addEventListener(el.tagName==='SELECT'?'change':'input',()=>{ state[ov][key]=t?t(el.value):el.value; }); };
  bind('c_text','text'); bind('c_label','label'); bind('c_title','title'); bind('c_subtitle','subtitle');
  bind('c_badge','badge'); bind('c_icon','icon'); bind('c_sub','sub'); bind('c_tag','tag');
  bind('c_name','name'); bind('c_url','url'); bind('c_team1','team1'); bind('c_team2','team2');
  bind('c_score1','score1',Number); bind('c_score2','score2',Number); bind('c_map','map');
  bindSlider('c_duration','sn',v=>{ state[ov].duration=v; });
  bindSlider('c_from','',v=>{ state[ov].from=v; });
  // Banner multi-message parser: each line "LABEL | text" or just "text"
  const msgEl=document.getElementById('c_messages');
  if(msgEl) msgEl.addEventListener('input',()=>{
    const lines=msgEl.value.trim().split('\n').filter(l=>l.trim());
    if(!lines.length){ state[ov].messages=null; return; }
    state[ov].messages=lines.map(l=>{
      const [lbl,...rest]=l.split('|');
      return rest.length?{label:lbl.trim(),text:rest.join('|').trim()}:{label:state[ov].label,text:lbl.trim()};
    });
  });
  const palEl=document.getElementById(`pal_${ov}`);
  if(palEl) bindPalette(ov,hex=>{ state[ov].color=hex; });
}

document.querySelectorAll('.ov-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.ov-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active'); currentOv=tab.dataset.ov; renderControls(currentOv);
  });
});
renderControls('brb');

document.getElementById('btn-clear').addEventListener('click',()=>{ gsap.killTweensOf('*'); canvas.innerHTML=''; });

// ── Helpers ──────────────────────────────────────────────────────────────────
const make=(cls,html)=>{ const e=document.createElement('div'); e.className=cls; e.innerHTML=html; return e; };
const kill=(el,dur=0.4)=>{ if(!el?.parentNode) return; gsap.to(el,{opacity:0,duration:dur,ease:'power2.in',onComplete:()=>el.remove()}); };
const killClass=cls=>canvas.querySelectorAll('.'+cls).forEach(e=>kill(e));
const rgb=hex=>{ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `${r},${g},${b}`; };
const ATM=`<div class="atm-rays"></div><div class="atm-glow"></div><div class="atm-vignette"></div><div class="atm-scanlines"></div>`;

// ── SHOW FUNCTIONS (identical to index.html, canvas replaces root) ────────────

function showBRB({ sub='Hemen Geri Dönüyorum', color='#FF4D00', url='arhaval.com' }={}) {
  const existing=canvas.querySelector('.overlay-brb'); if(existing){kill(existing,.5);return;}
  const el=make('overlay-brb',`${ATM}
    <div class="brb-content">
      <img class="brb-logo-img" src="logo.png" alt="Arhaval">
      <div class="brb-brand">ARHAVAL</div>
      <div class="brb-rule"><div class="brb-rule-line"></div><div class="brb-rule-dot"></div><div class="brb-rule-line"></div></div>
      <div class="brb-status">BE RIGHT BACK</div>
      <div class="brb-sub-text">${sub}</div>
      <div class="brb-dots"><div class="brb-dot"></div><div class="brb-dot"></div><div class="brb-dot"></div></div>
    </div>
    <div class="brb-bottom">
      <img class="brb-bottom-logo" src="logo.png" alt="">
      <div class="brb-bottom-name">ARHAVAL</div>
      <div class="brb-bottom-spacer"></div>
      <div class="brb-bottom-url">${url}</div>
    </div>`);
  el.querySelector('.brb-rule-dot').style.cssText=`background:${color};box-shadow:0 0 12px ${color}`;
  el.querySelector('.brb-bottom-logo').style.filter=`drop-shadow(0 0 6px ${color})`;
  canvas.appendChild(el);
  gsap.to(el,{opacity:1,duration:.7,ease:'power2.out'});
  gsap.fromTo(el.querySelector('.brb-logo-img'),{scale:.7,opacity:0,filter:'blur(20px)'},{scale:1,opacity:1,filter:'blur(0px)',duration:.9,ease:'back.out(1.5)',delay:.15});
  gsap.fromTo(el.querySelector('.brb-brand'),{y:20,opacity:0},{y:0,opacity:1,duration:.6,ease:'power3.out',delay:.45});
  gsap.fromTo(el.querySelector('.brb-rule'),{scaleX:0,opacity:0},{scaleX:1,opacity:1,duration:.5,ease:'power2.out',delay:.65});
  gsap.fromTo(el.querySelector('.brb-status'),{y:10,opacity:0},{y:0,opacity:1,duration:.5,ease:'power2.out',delay:.8});
  gsap.fromTo(el.querySelector('.brb-sub-text'),{y:10,opacity:0},{y:0,opacity:1,duration:.4,ease:'power2.out',delay:.95});
  gsap.fromTo(el.querySelector('.brb-bottom'),{y:30,opacity:0},{y:0,opacity:1,duration:.5,ease:'power3.out',delay:.6});
  el.querySelectorAll('.brb-dot').forEach((d,i)=>gsap.to(d,{opacity:1,duration:.5,repeat:-1,yoyo:true,ease:'sine.inOut',delay:i*.35}));
}

function showAd({ duration=15, title='Arhaval', subtitle='İzlediğin için teşekkürler!', badge='REKLAM ARASI', color='#FF4D00' }={}) {
  const circ=282;
  const el=make('overlay-ad',`${ATM}
    <div class="ad-top-line"></div>
    <div class="ad-progress"><div class="ad-progress-fill"></div></div>
    <div class="ad-badge"><div class="ad-badge-dot"></div>${badge}</div>
    <img class="ad-logo-img" src="logo.png" alt="Arhaval">
    <div class="ad-brand">${title.toUpperCase()}</div>
    <div class="ad-sub">${subtitle}</div>
    <div class="ad-ring-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110">
        <circle class="ad-ring-bg" cx="55" cy="55" r="46"/>
        <circle class="ad-ring-fg" cx="55" cy="55" r="46" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
      </svg>
      <div class="ad-ring-num">${duration}</div>
    </div>`);
  el.querySelector('.ad-top-line').style.background=`linear-gradient(90deg,transparent,${color} 25%,${color} 75%,transparent)`;
  el.querySelector('.ad-badge').style.cssText+=`;color:${color};border-color:rgba(${rgb(color)},.28);background:rgba(${rgb(color)},.07)`;
  el.querySelector('.ad-badge-dot').style.cssText=`background:${color};box-shadow:0 0 10px ${color}`;
  el.querySelector('.ad-ring-fg').style.cssText=`stroke:${color};filter:drop-shadow(0 0 8px ${color})`;
  el.querySelector('.ad-ring-num').style.color=color;
  el.querySelector('.ad-progress-fill').style.cssText=`background:${color};box-shadow:4px 0 20px rgba(${rgb(color)},.8)`;
  canvas.appendChild(el);
  const tl=gsap.timeline();
  tl.to(el,{opacity:1,duration:.7,ease:'power2.out'})
    .fromTo(el.querySelector('.ad-badge'),{y:-24,opacity:0},{y:0,opacity:1,duration:.5,ease:'power3.out'},.1)
    .fromTo(el.querySelector('.ad-logo-img'),{scale:.6,opacity:0,filter:'blur(16px)'},{scale:1,opacity:1,filter:'blur(0px)',duration:.9,ease:'back.out(1.5)'},.2)
    .fromTo(el.querySelector('.ad-brand'),{y:28,opacity:0},{y:0,opacity:1,duration:.6,ease:'back.out(2)'},.55)
    .fromTo(el.querySelector('.ad-sub'),{y:16,opacity:0},{y:0,opacity:1,duration:.5,ease:'power3.out'},.72)
    .fromTo(el.querySelector('.ad-ring-wrap'),{scale:.4,opacity:0},{scale:1,opacity:1,duration:.6,ease:'back.out(2)'},.85);
  gsap.to(el.querySelector('.ad-progress-fill'),{scaleX:0,duration,ease:'none',transformOrigin:'left'});
  let rem=duration;
  const ring_fg=el.querySelector('.ad-ring-fg'), ring_num=el.querySelector('.ad-ring-num');
  const iv=setInterval(()=>{ rem--; if(ring_num) ring_num.textContent=rem; if(ring_fg) ring_fg.style.strokeDashoffset=circ*(1-rem/duration); if(rem<=0){clearInterval(iv);kill(el,.8);} },1000);
}

function showBanner({ messages, text='Arhaval CS2 Turnuva Yayını', label='CANLI', duration=12, color='#FF4D00' }={}) {
  killClass('overlay-banner');
  const msgs = messages || [{ label, text }];
  let msgIdx = 0, cycleTimer = null;
  const el = make('overlay-banner', `
    <div class="bn-badge"><img src="logo.png" alt="Arhaval"></div>
    <div class="bn-body">
      <div class="bn-label">${msgs[0].label || label}</div>
      <div class="bn-slash"></div>
      <div class="bn-text">${msgs[0].text || text}</div>
    </div>
    <div class="bn-right">
      <div class="bn-live-label">LIVE</div>
      <div class="bn-live-dot"></div>
    </div>
    <div class="bn-bar"><div class="bn-bar-fill"></div></div>
  `);
  el.style.borderTopColor                           = color;
  el.querySelector('.bn-badge').style.background    = color;
  el.querySelector('.bn-label').style.color         = color;
  el.querySelector('.bn-live-dot').style.background = color;
  el.querySelector('.bn-bar-fill').style.background = color;
  canvas.appendChild(el);
  const body  = el.querySelector('.bn-body');
  const right = el.querySelector('.bn-right');
  const fill  = el.querySelector('.bn-bar-fill');
  gsap.to(el,    { clipPath:'inset(0 0 0% 0)',  duration:0.28, ease:'power3.out' });
  gsap.to(body,  { clipPath:'inset(0 0% 0 0)',  duration:0.26, ease:'power2.out', delay:0.16 });
  gsap.to(right, { clipPath:'inset(0 0% 0 0)',  duration:0.2,  ease:'power2.out', delay:0.3  });
  gsap.to(fill, { scaleX:0, duration, ease:'none', transformOrigin:'left',
    onComplete: () => {
      if (cycleTimer) clearTimeout(cycleTimer);
      gsap.to(el, { clipPath:'inset(0 0 100% 0)', duration:0.2, ease:'power2.in', onComplete:()=>el.remove() });
    }
  });
  if (msgs.length > 1) {
    const slotMs = (duration / msgs.length) * 1000;
    const labelEl = el.querySelector('.bn-label');
    const textEl  = el.querySelector('.bn-text');
    const cycleNext = () => {
      msgIdx = (msgIdx + 1) % msgs.length;
      const next = msgs[msgIdx];
      gsap.to(body, { clipPath:'inset(0 100% 0 0)', duration:0.16, ease:'power2.in',
        onComplete: () => {
          labelEl.textContent = next.label || label;
          textEl.textContent  = next.text  || text;
          gsap.fromTo(body, { clipPath:'inset(0 100% 0 0)' }, { clipPath:'inset(0 0% 0 0)', duration:0.22, ease:'power2.out' });
        }
      });
      if (el.parentNode) cycleTimer = setTimeout(cycleNext, slotMs);
    };
    cycleTimer = setTimeout(cycleNext, slotMs);
  }
}
function showLower({ name='Arhaval', sub='CS2 · Turnuva', tag='YAYINCI', color='#FF4D00', duration=6 }={}) {
  killClass('overlay-lower');
  const el=make('overlay-lower',`
    <div class="lt-tag-row">
      <div class="lt-logo-box"><img src="logo.png" alt=""></div>
      <div class="lt-tag-wrap"><div class="lt-tag">${tag}</div></div>
    </div>
    <div class="lt-main">
      <div class="lt-name">${name}</div>
      ${sub?`<div class="lt-divider"></div><div class="lt-sub">${sub}</div>`:''}
    </div>`);
  el.querySelector('.lt-logo-box').style.background=color;
  el.querySelector('.lt-tag-wrap').style.background=`rgba(${rgb(color)},0.85)`;
  el.querySelector('.lt-main').style.borderTopColor=color;
  el.querySelector('.lt-main').style.borderLeftColor=color;
  const div=el.querySelector('.lt-divider'); if(div) div.style.background=color;
  canvas.appendChild(el);
  gsap.set(el,{opacity:1,x:'-100%'});
  gsap.to(el,{x:0,duration:.55,ease:'power3.out'});
  gsap.from(el.querySelectorAll('.lt-name,.lt-sub'),{x:-20,opacity:0,duration:.4,stagger:.08,ease:'power2.out',delay:.25});
  setTimeout(()=>gsap.to(el,{x:'-110%',duration:.5,ease:'power2.in',onComplete:()=>el.remove()}),duration*1000);
}

function showPopup({ text='Bildirim', title='BİLDİRİM', icon='🔔', duration=6, color='#FF4D00' }={}) {
  canvas.querySelectorAll('.overlay-popup').forEach(p=>gsap.to(p,{bottom:'+=180',duration:.3,ease:'power2.out'}));
  const el=make('overlay-popup',`
    <div class="pop-accent"></div>
    <div class="pop-body">
      <div class="pop-header"><div class="pop-icon">${icon}</div><div class="pop-title">${title}</div></div>
      <div class="pop-text">${text}</div>
    </div>
    <div class="pop-timer"><div class="pop-timer-bar"></div></div>`);
  el.querySelector('.pop-accent').style.background=color;
  el.querySelector('.pop-timer-bar').style.background=color;
  el.querySelector('.pop-title').style.color=color;
  canvas.appendChild(el);
  gsap.set(el,{opacity:0,x:80}); gsap.to(el,{opacity:1,x:0,duration:.45,ease:'back.out(1.8)'});
  gsap.to(el.querySelector('.pop-timer-bar'),{scaleX:0,duration,ease:'none',transformOrigin:'left',onComplete:()=>gsap.to(el,{opacity:0,x:80,duration:.4,ease:'power2.in',onComplete:()=>el.remove()})});
}

function showAlert({ text='CLUTCH!', label='ARHAVAL · ALERT', duration=4, color='#FF4D00' }={}) {
  const el=make('overlay-alert',`
    <div class="al-backdrop"></div>
    <div class="al-ring r1"></div><div class="al-ring r2"></div><div class="al-ring r3"></div>
    <div class="al-box">
      <div class="al-eyebrow">${label}</div>
      <div class="al-text">${text}</div>
      <div class="al-particles"></div>
    </div>`);
  const c=color;
  el.querySelector('.al-backdrop').style.background=`radial-gradient(ellipse 60% 40% at 50% 50%,rgba(${rgb(c)},.1) 0%,transparent 70%)`;
  el.querySelectorAll('.al-ring').forEach(r=>r.style.borderColor=c);
  el.querySelector('.al-box').style.borderColor=`rgba(${rgb(c)},.4)`;
  el.querySelector('.al-eyebrow').style.color=c;
  el.querySelector('.al-text').style.textShadow=`0 0 60px rgba(${rgb(c)},.45)`;
  canvas.appendChild(el);
  const box=el.querySelector('.al-box'), rings=el.querySelectorAll('.al-ring');
  const tl=gsap.timeline();
  tl.to(el,{opacity:1,duration:0})
    .fromTo(box,{opacity:0,scale:.65,skewX:-3},{opacity:1,scale:1,skewX:0,duration:.5,ease:'back.out(2)'})
    .to(rings[0],{scale:7,opacity:0,duration:.9,ease:'power2.out'},0)
    .to(rings[1],{scale:12,opacity:0,duration:1.2,ease:'power2.out'},.08)
    .to(rings[2],{scale:18,opacity:0,duration:1.5,ease:'power2.out'},.16);
  const pc=el.querySelector('.al-particles');
  for(let i=0;i<40;i++){
    const p=document.createElement('div'); p.className='al-particle';
    const sz=3+Math.random()*10,ang=(Math.random()*360)*Math.PI/180,dist=100+Math.random()*300;
    p.style.cssText=`left:${45+Math.random()*10}%;top:${40+Math.random()*20}%;width:${sz}px;height:${sz}px;background:${Math.random()>.3?color:'#fff'};border-radius:${Math.random()>.4?'50%':'2px'};`;
    pc.appendChild(p);
    gsap.fromTo(p,{opacity:1,x:0,y:0,scale:1},{opacity:0,x:Math.cos(ang)*dist,y:Math.sin(ang)*dist,scale:0,rotation:Math.random()*360,duration:.7+Math.random()*.9,delay:Math.random()*.2,ease:'power2.out'});
  }
  setTimeout(()=>kill(el,.5),duration*1000);
}

function showHype({ text='HYPE!', duration=3, color='#FF4D00' }={}) {
  const el=make('overlay-hype',`
    <div class="hy-flash"></div>
    <svg class="hy-lines" style="position:absolute;inset:0;width:100%;height:100%">
      ${Array.from({length:12},(_,i)=>`<line x1="960" y1="540" x2="${Math.cos(i/12*Math.PI*2)*1200+960}" y2="${Math.sin(i/12*Math.PI*2)*1200+540}"/>`).join('')}
    </svg>
    <div class="hy-glow">${text}</div>
    <div class="hy-text">${text}</div>`);
  el.querySelector('.hy-flash').style.background=color;
  el.querySelector('.hy-text').style.webkitTextStroke=`3px ${color}`;
  el.querySelector('.hy-text').style.filter=`drop-shadow(0 0 40px ${color})`;
  el.querySelector('.hy-glow').style.color=color;
  el.querySelectorAll('.hy-lines line').forEach(l=>l.style.stroke=`rgba(${rgb(color)},.25)`);
  canvas.appendChild(el);
  const flash=el.querySelector('.hy-flash'),lines=el.querySelector('.hy-lines'),glow=el.querySelector('.hy-glow'),txt=el.querySelector('.hy-text');
  const tl=gsap.timeline();
  tl.to(el,{opacity:1,duration:0})
    .fromTo(flash,{opacity:.4},{opacity:0,duration:.35,ease:'power2.out'})
    .fromTo(txt,{opacity:0,scale:1.9,rotation:-4},{opacity:1,scale:1,rotation:0,duration:.5,ease:'back.out(2)'},0)
    .fromTo(glow,{opacity:.8,scale:1.3},{opacity:0,scale:2.2,duration:.9,ease:'power2.out'},0)
    .fromTo(lines,{opacity:.5,scale:.8},{opacity:0,scale:2,duration:.8,ease:'power2.out'},0);
  gsap.to(canvas,{x:10,duration:.04,repeat:10,yoyo:true,ease:'none',onComplete:()=>gsap.set(canvas,{x:0})});
  setTimeout(()=>kill(el,.5),duration*1000);
}

function showGG({ label='MATCH OVER', sub='Good game · Well played', duration=6 }={}) {
  const el=make('overlay-gg',`
    <div class="gg-confetti"></div>
    <div class="gg-eyebrow">${label}</div>
    <div class="gg-text">GG</div>
    <div class="gg-sub">${sub}</div>`);
  canvas.appendChild(el);
  gsap.to(el,{opacity:1,duration:0});
  gsap.fromTo(el.querySelector('.gg-text'),{opacity:0,scale:.4,rotation:-8},{opacity:1,scale:1,rotation:0,duration:.9,ease:'elastic.out(1,.5)'});
  gsap.fromTo(el.querySelector('.gg-eyebrow'),{opacity:0,y:-20},{opacity:1,y:0,duration:.5,ease:'power2.out',delay:.3});
  gsap.fromTo(el.querySelector('.gg-sub'),{opacity:0,y:20},{opacity:1,y:0,duration:.5,ease:'power2.out',delay:.5});
  const cols=['#FF4D00','#FFD060','#22C55E','#4D8BFF','#fff','#FF6B2C','#A855F7','#EC4899'];
  const wrap=el.querySelector('.gg-confetti');
  for(let i=0;i<100;i++){
    const p=document.createElement('div'); p.className='gg-piece';
    const col=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText=`left:${10+Math.random()*80}%;top:-20px;background:${col};width:${6+Math.random()*12}px;height:${10+Math.random()*16}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(p);
    gsap.to(p,{y:1200+Math.random()*200,x:(Math.random()-.5)*500,rotation:(Math.random()-.5)*720,opacity:[{value:1},{value:0,delay:.7}],duration:2+Math.random()*3,delay:Math.random()*1.8,ease:'power1.in'});
  }
  setTimeout(()=>kill(el,.8),duration*1000);
}

function showScore({ team1='ARHAVAL', team2='RIVAL', score1=0, score2=0, map='MIRAGE' }={}) {
  killClass('overlay-score');
  const el=make('overlay-score',`
    <div class="sc-wrap">
      <div class="sc-team ct"><div class="sc-side">CT</div><div class="sc-name">${team1}</div><div class="sc-score">${String(score1).padStart(2,'0')}</div></div>
      <div class="sc-mid"><div class="sc-map">${map}</div><div class="sc-live"><div class="sc-live-dot"></div>LIVE</div></div>
      <div class="sc-team t"><div class="sc-side">T</div><div class="sc-name">${team2}</div><div class="sc-score">${String(score2).padStart(2,'0')}</div></div>
    </div>`);
  canvas.appendChild(el);
  gsap.set(el,{opacity:0,y:-20,scale:.96}); gsap.to(el,{opacity:1,y:0,scale:1,duration:.45,ease:'back.out(1.8)'});
  gsap.to(el.querySelector('.sc-live-dot'),{opacity:.2,duration:.7,repeat:-1,yoyo:true,ease:'sine.inOut'});
}

function showClip({ text='CLIP IT!', sub='Anı kaydet', duration=3, color='#FF4D00' }={}) {
  const el=make('overlay-clip',`
    <div class="cl-wrap">
      <div class="cl-icon-box">🎬</div>
      <div class="cl-text-box"><div class="cl-label">ARHAVAL</div><div class="cl-main">${text}</div></div>
    </div>`);
  el.querySelector('.cl-icon-box').style.background=color;
  el.querySelector('.cl-text-box').style.borderColor=`rgba(${rgb(color)},.4)`;
  el.querySelector('.cl-label').style.color=color;
  canvas.appendChild(el);
  gsap.set(el,{opacity:0,x:60,y:-10}); gsap.to(el,{opacity:1,x:0,y:0,duration:.4,ease:'back.out(2)'});
  setTimeout(()=>gsap.to(el,{opacity:0,x:60,duration:.4,ease:'power2.in',onComplete:()=>el.remove()}),duration*1000);
}

function showCountdown({ from=5, label='Maç Başlıyor', sub='ARHAVAL', color='#FF4D00' }={}) {
  const ex=canvas.querySelector('.overlay-countdown'); if(ex){kill(ex,.3);return;}
  const circ=2*Math.PI*130;
  const el=make('overlay-countdown',`
    <div class="cd-bg"></div>
    <div class="cd-eyebrow">${label}</div>
    <div class="cd-ring-wrap">
      <svg viewBox="0 0 300 300" width="300" height="300">
        <circle class="cd-ring-bg" cx="150" cy="150" r="130"/>
        <circle class="cd-ring-fg" cx="150" cy="150" r="130" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="0"/>
      </svg>
      <div class="cd-num">${from}</div>
    </div>
    <div class="cd-sub">${sub}</div>`);
  el.querySelector('.cd-ring-fg').style.cssText=`stroke:${color};filter:drop-shadow(0 0 10px ${color})`;
  el.querySelector('.cd-num').style.cssText=`color:${color};text-shadow:0 0 100px rgba(${rgb(color)},.4)`;
  canvas.appendChild(el);
  gsap.to(el,{opacity:1,duration:.4,ease:'power2.out'});
  let rem=from;
  const numEl=el.querySelector('.cd-num'),ringEl=el.querySelector('.cd-ring-fg');
  gsap.fromTo(numEl,{scale:1.5,opacity:.3},{scale:1,opacity:1,duration:.35,ease:'back.out(2)'});
  const iv=setInterval(()=>{
    rem--; if(!el.parentNode){clearInterval(iv);return;}
    if(rem<=0){
      clearInterval(iv); numEl.textContent='GO!'; numEl.style.color='#00E5A0'; numEl.style.textShadow='0 0 120px rgba(0,229,160,.6)';
      gsap.fromTo(numEl,{scale:1.8,opacity:0},{scale:1,opacity:1,duration:.5,ease:'back.out(2)'});
      setTimeout(()=>kill(el,.6),2000);
    } else {
      numEl.textContent=rem; ringEl.style.strokeDashoffset=circ*(1-rem/from);
      gsap.fromTo(numEl,{scale:1.4,opacity:.3},{scale:1,opacity:1,duration:.3,ease:'back.out(2)'});
    }
  },1000);
}

const SHOW_FNS={brb:showBRB,ad:showAd,banner:showBanner,lower:showLower,popup:showPopup,alert:showAlert,hype:showHype,gg:showGG,score:showScore,clip:showClip,countdown:showCountdown};

document.getElementById('btn-preview').addEventListener('click',()=>{ const fn=SHOW_FNS[currentOv]; if(fn) fn(state[currentOv]); });
document.getElementById('btn-copy').addEventListener('click',()=>{
  navigator.clipboard.writeText(JSON.stringify(state[currentOv],null,2)).then(()=>{
    const btn=document.getElementById('btn-copy'); btn.textContent='✓ Kopyalandı!';
    setTimeout(()=>btn.textContent='{ } JSON Kopyala',2000);
  });
});
</script>
