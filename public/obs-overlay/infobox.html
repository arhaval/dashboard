<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Info Box</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: transparent !important;
  width: 400px;
  height: 150px;
  overflow: hidden;
  display: block;
}

:root {
  --acc:      #E2FC03;
  --acc-glow: rgba(226,252,3,0.55);
  --f-disp:   'Barlow Condensed', sans-serif;
  --f-mono:   'Share Tech Mono', monospace;
}

/* ── BOX ── */
.box {
  position: relative;
  width: 400px;
  height: 150px;
  overflow: hidden;
  background-color: #0D0D0D;
  background-image:
    repeating-linear-gradient(45deg,  rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 6px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 6px),
    linear-gradient(180deg, #161616 0%, #0A0A0A 100%);
  clip-path: polygon(18px 0%, 100% 0%, calc(100% - 18px) 100%, 0% 100%);
  border-top: 3px solid var(--acc);
  box-shadow: 0 0 0 1px rgba(226,252,3,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
  animation: rgbVibrate 0.07s steps(2) infinite;
}

@keyframes rgbVibrate {
  0%  { filter: none; }
  50% { filter: drop-shadow(-1.5px 0 0 rgba(255,0,80,0.35)) drop-shadow(1.5px 0 0 rgba(0,255,180,0.35)); }
}

/* ── overlays ── */
.scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px);
  pointer-events: none; z-index: 10;
  animation: scanFlicker 4s ease-in-out infinite;
}
@keyframes scanFlicker { 0%,92%,100%{opacity:1} 94%{opacity:.55} 96%{opacity:.85} 98%{opacity:.4} }

.sweep {
  position: absolute; top: 0; left: -60%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 60%, transparent 100%);
  pointer-events: none; z-index: 9; transform: skewX(-8deg);
  animation: lightSweep 3s ease-in-out infinite;
}
@keyframes lightSweep { 0%{left:-60%;opacity:0} 5%{opacity:1} 80%{opacity:1} 100%{left:110%;opacity:0} }

.acc-glow { position:absolute;top:0;left:0;right:0;height:1px;background:var(--acc);box-shadow:0 0 12px 2px var(--acc-glow);z-index:8; }
.corner-tr { position:absolute;top:6px;right:28px;width:18px;height:18px;border-top:1px solid rgba(226,252,3,0.3);border-right:1px solid rgba(226,252,3,0.3);z-index:7; }
.corner-bl { position:absolute;bottom:14px;left:28px;width:14px;height:14px;border-bottom:1px solid rgba(255,255,255,0.08);border-left:1px solid rgba(255,255,255,0.08);z-index:7; }

/* ── slides ── */
.slides-wrap { position:absolute;inset:3px 0 14px 0;overflow:hidden;z-index:5; }

.slide {
  position:absolute;inset:0;display:flex;align-items:center;
  padding:0 36px 0 40px;gap:18px;opacity:0;
}
.slide.active { opacity:1; }

.slide-icon {
  flex-shrink:0;width:42px;height:42px;background:rgba(226,252,3,0.08);
  border:1px solid rgba(226,252,3,0.25);display:flex;align-items:center;justify-content:center;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.slide-icon svg { width:22px;height:22px;fill:var(--acc); }

.slide-body { flex:1;min-width:0; }

.slide-tag {
  font-family:var(--f-mono);font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:var(--acc);margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.slide-tag::before { content:'';width:18px;height:1px;background:var(--acc);opacity:.6; }

.slide-main {
  font-family:var(--f-disp);font-size:26px;font-weight:900;font-style:italic;
  text-transform:uppercase;letter-spacing:.5px;color:#fff;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.slide-main .acc { color:var(--acc); }

.slide-sub { font-family:var(--f-mono);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.35);margin-top:5px;white-space:nowrap; }

/* sponsor */
.sponsor-logo {
  font-family:var(--f-disp);font-size:28px;font-weight:900;font-style:italic;
  text-transform:uppercase;letter-spacing:6px;color:transparent;
  -webkit-text-stroke:1px rgba(226,252,3,0.7);text-shadow:0 0 20px rgba(226,252,3,0.25);white-space:nowrap;
}
.partner-badge {
  display:inline-flex;align-items:center;gap:6px;background:rgba(226,252,3,0.07);
  border:1px solid rgba(226,252,3,0.2);padding:3px 10px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);margin-bottom:5px;
}
.partner-badge span { font-family:var(--f-mono);font-size:8px;letter-spacing:3px;color:var(--acc);text-transform:uppercase; }

/* progress */
.progress-wrap { position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.06);z-index:6; }
.progress-fill { height:100%;background:linear-gradient(90deg,rgba(226,252,3,0.6),var(--acc));transform-origin:left;transform:scaleX(0);box-shadow:0 0 6px rgba(226,252,3,0.6); }

/* dots */
.slide-dots { position:absolute;bottom:5px;right:32px;display:flex;gap:5px;z-index:7; }
.dot { width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .3s; }
.dot.on { background:var(--acc);box-shadow:0 0 4px var(--acc); }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="acc-glow"></div>
  <div class="scanlines"></div>
  <div class="sweep"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="slides-wrap" id="slides-wrap"></div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="slide-dots" id="dots"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DEFAULT CONFIG — overridden by URL params or postMessage
// ══════════════════════════════════════════════════════
const DEFAULTS = {
  accent:    '#E2FC03',
  duration:  10,
  s1_tag:    'Follow Us',
  s1_main:   '@ARHAVAL',
  s1_sub:    'twitch · youtube · instagram · x',
  s2_tag:    'Next Match',
  s2_t1:     'NaVi',
  s2_t2:     'FaZe',
  s2_sub:    'today · 21:00 · grand final',
  s3_badge:  'Official Partner',
  s3_logo:   'SPONSOR',
  s3_url:    'arhaval.gg/partner',
};

// Read URL params
const P = new URLSearchParams(location.search);
let cfg = {};
Object.keys(DEFAULTS).forEach(k => { cfg[k] = P.get(k) || DEFAULTS[k]; });
cfg.duration = parseFloat(cfg.duration) || 10;

// ══════════════════════════════════════════════════════
//  SLIDE TEMPLATES
// ══════════════════════════════════════════════════════
const ICONS = {
  social: `<svg viewBox="0 0 24 24"><path d="M22.46 6c-.77.35-1.6.58-2.46.69.88-.53 1.56-1.37 1.88-2.38-.83.5-1.75.85-2.72 1.05C18.37 4.5 17.26 4 16 4c-2.35 0-4.27 1.92-4.27 4.29 0 .34.04.67.11.98C8.28 9.09 5.11 7.38 3 4.79c-.37.63-.58 1.37-.58 2.15 0 1.49.75 2.81 1.91 3.56-.71 0-1.37-.2-1.95-.5v.03c0 2.08 1.48 3.82 3.44 4.21a4.22 4.22 0 0 1-1.93.07 4.28 4.28 0 0 0 4 2.98 8.521 8.521 0 0 1-5.33 1.84c-.34 0-.68-.02-1.02-.06C3.44 20.29 5.7 21 8.12 21 16 21 20.33 14.46 20.33 8.79c0-.19 0-.37-.01-.56.84-.6 1.56-1.36 2.14-2.23z"/></svg>`,
  play:   `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`,
  shield: `<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>`,
};

function buildSlides(c) {
  return [
    // Slide 0 — Follow
    `<div class="slide active" id="slide-0">
      <div class="slide-icon">${ICONS.social}</div>
      <div class="slide-body">
        <div class="slide-tag">${c.s1_tag}</div>
        <div class="slide-main">@<span class="acc">${c.s1_main.replace(/^@/,'')}</span></div>
        <div class="slide-sub">${c.s1_sub}</div>
      </div>
    </div>`,
    // Slide 1 — Match
    `<div class="slide" id="slide-1">
      <div class="slide-icon">${ICONS.play}</div>
      <div class="slide-body">
        <div class="slide-tag">${c.s2_tag}</div>
        <div class="slide-main">${c.s2_t1} <span class="acc" style="font-size:18px;font-weight:600">vs</span> ${c.s2_t2}</div>
        <div class="slide-sub">${c.s2_sub}</div>
      </div>
    </div>`,
    // Slide 2 — Sponsor
    `<div class="slide" id="slide-2">
      <div class="slide-icon">${ICONS.shield}</div>
      <div class="slide-body">
        <div class="partner-badge"><span>${c.s3_badge}</span></div>
        <div class="sponsor-logo">${c.s3_logo}</div>
        <div class="slide-sub" style="margin-top:2px">${c.s3_url}</div>
      </div>
    </div>`,
  ];
}

// ══════════════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════════════
let current = 0, progressTween = null, transitioning = false;
const fillEl   = document.getElementById('progress-fill');
const dotsWrap = document.getElementById('dots');
const wrap     = document.getElementById('slides-wrap');

function applyAccent(hex) {
  document.documentElement.style.setProperty('--acc', hex);
  // Rebuild glow color from hex
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--acc-glow', `rgba(${r},${g},${b},0.55)`);
}

function render(c) {
  applyAccent(c.accent || '#E2FC03');
  wrap.innerHTML = buildSlides(c).join('');
  dotsWrap.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    dotsWrap.appendChild(d);
  }
  current = 0; transitioning = false;
}

function updateDots(idx) {
  dotsWrap.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===idx));
}

function startProgress() {
  if (progressTween) progressTween.kill();
  gsap.set(fillEl, { scaleX: 0 });
  progressTween = gsap.to(fillEl, { scaleX:1, duration: cfg.duration, ease:'none', onComplete: nextSlide });
}

function nextSlide() {
  if (transitioning) return;
  transitioning = true;
  const slides = wrap.querySelectorAll('.slide');
  const from = slides[current];
  current = (current + 1) % 3;
  const to = slides[current];

  gsap.set(to, { opacity:1, clipPath:'inset(100% 0 0 0)', x:0 });
  to.classList.add('active');

  const tl = gsap.timeline({ onComplete() {
    from.classList.remove('active');
    gsap.set(from, { opacity:0, clipPath:'inset(0 0 0 0)', x:0 });
    transitioning = false;
    updateDots(current);
    startProgress();
  }});

  tl.to(from, { keyframes:[
    { clipPath:'inset(20% 0 30% 0)', x:-7, filter:'hue-rotate(90deg) saturate(3)', duration:.05 },
    { clipPath:'inset(50% 0 10% 0)', x: 6, filter:'hue-rotate(200deg)',            duration:.05 },
    { clipPath:'inset(5%  0 70% 0)', x:-9, filter:'none',                          duration:.04 },
    { clipPath:'inset(0   0 100% 0)',x: 0, opacity:0,                              duration:.04 },
  ]});

  tl.fromTo(to,
    { clipPath:'inset(100% 0 0 0)', x:8, filter:'hue-rotate(180deg) saturate(3)', opacity:1 },
    { keyframes:[
      { clipPath:'inset(60% 0 0 0)',  x:-6, filter:'hue-rotate(90deg)', duration:.05 },
      { clipPath:'inset(30% 0 15% 0)',x: 4, filter:'none',              duration:.05 },
      { clipPath:'inset(8%  0 5%  0)',x:-2,                             duration:.04 },
      { clipPath:'inset(0   0 0   0)',x: 0,                             duration:.04 },
    ]},
    '-=0.12'
  );
}

// ── Entrance ──
function init(c) {
  render(c);
  gsap.fromTo('#box',
    { opacity:0, scaleX:.92, transformOrigin:'left center' },
    { opacity:1, scaleX:1,   duration:.5, ease:'power3.out' }
  );
  const s0els = wrap.querySelectorAll('#slide-0 .slide-icon, #slide-0 .slide-body > *');
  gsap.from(s0els, { opacity:0, x:-10, stagger:.08, duration:.35, delay:.35, ease:'power2.out' });
  startProgress();
}

init(cfg);

// ══════════════════════════════════════════════════════
//  postMessage API — editor communicates via this
// ══════════════════════════════════════════════════════
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'infobox-update') return;
  const newCfg = Object.assign({}, cfg, e.data.cfg);
  newCfg.duration = parseFloat(newCfg.duration) || 10;
  cfg = newCfg;
  if (progressTween) progressTween.kill();
  render(cfg);
  startProgress();
});
</script>
</body>
</html>
