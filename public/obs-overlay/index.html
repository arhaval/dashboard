<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arhaval OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --acc:      #FF4D00;
  --acc2:     #FF6B2C;
  --acc-glow: rgba(255,77,0,0.55);
  --acc-dim:  rgba(255,77,0,0.12);
  --ct:       #4D8BFF;
  --t:        #FF8C00;
  --gold:     #FFD060;
  --green:    #00E5A0;
  --dark:     #07070E;
  --surface:  rgba(8,8,16,0.97);
  --border:   rgba(255,255,255,0.07);
  --text:     #FFFFFF;
  --sub:      rgba(255,255,255,0.5);
  --muted:    rgba(255,255,255,0.22);
  --f-display: 'Barlow Condensed', system-ui;
  --f-ui:      'Rajdhani', system-ui;
  --f-mono:    'IBM Plex Mono', monospace;
}

body {
  width: 1920px; height: 1080px;
  background: transparent; overflow: hidden;
  font-family: var(--f-ui);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
#root { position: absolute; inset: 0; pointer-events: none; }

/* ── SHARED: ATMOSPHERIC BACKGROUND ─────────────────────────────────────────
   Used by BRB and Ad break — the ESL-style full-screen feel
────────────────────────────────────────────────────────────────────────── */
.atm-rays {
  position: absolute;
  width: 2200px; height: 2200px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg, transparent 11deg,
    rgba(255,77,0,0.018) 11deg, rgba(255,77,0,0.018) 15deg,
    transparent 15deg, transparent 26deg
  );
  animation: raySpin 80s linear infinite;
  pointer-events: none;
}
@keyframes raySpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

.atm-glow {
  position: absolute;
  width: 900px; height: 900px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,77,0,0.10) 0%, rgba(255,77,0,0.03) 45%, transparent 70%);
  animation: glowPulse 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glowPulse {
  0%,100% { opacity: 1;   transform: translate(-50%,-50%) scale(1); }
  50%     { opacity: 0.6; transform: translate(-50%,-50%) scale(1.18); }
}

.atm-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 35%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
}

.atm-scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent 0px, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none; z-index: 10;
}

@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(255,77,0,0.45)) drop-shadow(0 0 70px rgba(255,77,0,0.18)); }
  50%     { filter: drop-shadow(0 0 48px rgba(255,77,0,0.85)) drop-shadow(0 0 130px rgba(255,77,0,0.40)); }
}

/* ══════════════════════════════════════════════════════════════════════════
   1. BANNER — broadcast lower third
══════════════════════════════════════════════════════════════════════════ */
.overlay-banner {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 80px; z-index: 50;
  display: flex; align-items: stretch;
  /* Koyu lacivert — siyah değil, broadcast derinliği */
  background: linear-gradient(90deg, #08101E 0%, #0C1424 55%, #090E1A 100%);
  border-top: 3px solid var(--acc);
  clip-path: inset(0 0 100% 0);
}

/* Sol: logo bloğu — büyük, baskın, paralel kenar */
.bn-badge {
  background: var(--acc);
  clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 100%, 0 100%);
  padding: 0 60px 0 36px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; min-width: 140px; position: relative;
}
/* üstten ince highlight — badge derinliği */
.bn-badge::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,0.22); pointer-events: none;
}
.bn-badge img {
  height: 48px; width: auto; object-fit: contain;
  filter: brightness(0) invert(1);
}

/* Badge-body ayırıcı */
.bn-sep {
  width: 1px; background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}

/* Merkez: etiket + ana metin */
.bn-body {
  flex: 1; display: flex; align-items: center;
  padding: 0 44px; gap: 0; overflow: hidden;
  clip-path: inset(0 100% 0 0);
  flex-direction: column; justify-content: center;
}
.bn-label {
  font-family: var(--f-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--acc); white-space: nowrap;
  line-height: 1; margin-bottom: 5px;
}
.bn-text {
  font-family: var(--f-display); font-size: 36px; font-weight: 800;
  letter-spacing: 0.5px; white-space: nowrap; overflow: hidden;
  line-height: 1; color: #fff;
  text-shadow: 0 1px 12px rgba(0,0,0,0.5);
}

/* Sağ: LIVE göstergesi */
.bn-right {
  display: flex; align-items: center; gap: 10px;
  padding: 0 36px; flex-shrink: 0;
  clip-path: inset(0 100% 0 0);
  border-left: 1px solid rgba(255,255,255,0.07);
}
.bn-live-label {
  font-family: var(--f-mono); font-size: 9px; font-weight: 600;
  letter-spacing: 4px; text-transform: uppercase;
  color: rgba(255,255,255,0.38);
}
.bn-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--acc);
  box-shadow: 0 0 6px rgba(255,77,0,0.8);
  animation: bnDot 1.6s ease-in-out infinite;
}
@keyframes bnDot { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Alt: progress bar */
.bn-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,0.05);
}
.bn-bar-fill {
  height: 100%; width: 100%;
  background: var(--acc); transform-origin: left;
}

/* ══════════════════════════════════════════════════════════════════════════
   2. LOWER THIRD — broadcast player/caster ID
══════════════════════════════════════════════════════════════════════════ */
.overlay-lower {
  position: absolute; bottom: 80px; left: 0;
  opacity: 0; z-index: 50;
  display: flex; flex-direction: column;
}
.lt-tag-row {
  display: flex; align-items: center; gap: 0;
  width: fit-content;
}
.lt-logo-box {
  background: var(--acc);
  width: 42px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lt-logo-box img {
  height: 18px; width: auto; object-fit: contain;
  filter: brightness(0) invert(1);
}
.lt-tag-wrap {
  background: rgba(255,77,0,0.85);
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 100%, 0 100%);
  padding: 5px 24px 5px 12px;
}
.lt-tag {
  font-family: var(--f-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 4px; text-transform: uppercase; color: #fff;
}
.lt-main {
  display: flex; align-items: center;
  background: var(--surface);
  border-top: 2px solid var(--acc);
  border-left: 2px solid var(--acc);
  clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 50%, calc(100% - 28px) 100%, 0 100%);
  padding: 11px 56px 11px 22px; gap: 20px;
}
.lt-name {
  font-family: var(--f-display); font-size: 44px; font-weight: 800;
  letter-spacing: -0.5px; line-height: 1; white-space: nowrap;
}
.lt-divider { width: 2px; height: 32px; background: var(--acc); flex-shrink: 0; }
.lt-sub {
  font-family: var(--f-ui); font-size: 18px; font-weight: 500;
  color: var(--sub); white-space: nowrap;
}

/* ══════════════════════════════════════════════════════════════════════════
   3. CORNER POPUP
══════════════════════════════════════════════════════════════════════════ */
.overlay-popup {
  position: absolute; bottom: 100px; right: 48px;
  width: 420px; z-index: 60; opacity: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
}
.pop-accent { height: 3px; background: var(--acc); box-shadow: 0 0 16px var(--acc-glow); }
.pop-body { padding: 18px 22px 20px; }
.pop-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.pop-icon { font-size: 22px; line-height: 1; }
.pop-title {
  font-family: var(--f-mono); font-size: 10px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase; color: var(--acc);
}
.pop-text {
  font-family: var(--f-display); font-size: 22px; font-weight: 600;
  line-height: 1.4; color: var(--text);
}
.pop-timer { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
.pop-timer-bar { height: 100%; background: var(--acc); transform-origin: left; }

/* ══════════════════════════════════════════════════════════════════════════
   4. CENTER ALERT
══════════════════════════════════════════════════════════════════════════ */
.overlay-alert {
  position: absolute; inset: 0; z-index: 90;
  display: flex; align-items: center; justify-content: center; opacity: 0;
}
.al-backdrop { position: absolute; inset: 0; }
.al-ring { position: absolute; border-radius: 50%; border: 1px solid; opacity: 0; pointer-events: none; }
.al-box {
  position: relative; z-index: 2; background: var(--surface);
  border: 1px solid rgba(255,77,0,0.4);
  clip-path: polygon(20px 0, 100% 0, calc(100% - 20px) 100%, 0 100%);
  padding: 48px 100px; text-align: center; opacity: 0;
  box-shadow: 0 0 80px rgba(255,77,0,0.15), 0 40px 80px rgba(0,0,0,0.8);
}
.al-box::before { content:''; position:absolute; top:-1px; left:19px; width:20px; height:20px; border-top:2px solid var(--acc); border-left:2px solid var(--acc); }
.al-box::after  { content:''; position:absolute; bottom:-1px; right:19px; width:20px; height:20px; border-bottom:2px solid var(--acc); border-right:2px solid var(--acc); }
.al-eyebrow {
  font-family: var(--f-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 6px; text-transform: uppercase; color: var(--acc);
  margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 12px;
}
.al-eyebrow::before, .al-eyebrow::after { content:''; flex:1; max-width:80px; height:1px; background:rgba(255,77,0,0.4); }
.al-text {
  font-family: var(--f-display); font-size: 72px; font-weight: 900;
  letter-spacing: -1px; line-height: 1;
}
.al-particles { position: absolute; inset: -60px; pointer-events: none; }
.al-particle  { position: absolute; opacity: 0; }

/* ══════════════════════════════════════════════════════════════════════════
   5. HYPE
══════════════════════════════════════════════════════════════════════════ */
.overlay-hype {
  position: absolute; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; overflow: hidden;
}
.hy-flash { position: absolute; inset: 0; opacity: 0; }
.hy-lines { position: absolute; inset: 0; opacity: 0; }
.hy-lines line { stroke-width: 1; }
.hy-text {
  font-family: var(--f-display); font-size: 240px; font-weight: 900;
  letter-spacing: -12px; text-transform: uppercase;
  color: transparent; -webkit-text-stroke: 3px var(--acc);
  line-height: 1; position: relative; z-index: 2; opacity: 0;
}
.hy-glow {
  position: absolute;
  font-family: var(--f-display); font-size: 240px; font-weight: 900;
  letter-spacing: -12px; text-transform: uppercase;
  opacity: 0; filter: blur(60px); line-height: 1;
}

/* ══════════════════════════════════════════════════════════════════════════
   6. GG
══════════════════════════════════════════════════════════════════════════ */
.overlay-gg {
  position: absolute; inset: 0; z-index: 80;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; overflow: hidden;
}
.gg-confetti { position: absolute; inset: 0; pointer-events: none; }
.gg-piece    { position: absolute; opacity: 0; }
.gg-eyebrow  {
  font-family: var(--f-mono); font-size: 12px; font-weight: 600;
  letter-spacing: 10px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; opacity: 0;
}
.gg-text {
  font-family: var(--f-display); font-size: 220px; font-weight: 900;
  letter-spacing: -12px; line-height: 0.9;
  color: var(--gold); text-shadow: 0 0 120px rgba(255,208,96,0.5); opacity: 0;
}
.gg-sub {
  font-family: var(--f-mono); font-size: 14px; font-weight: 600;
  letter-spacing: 6px; text-transform: uppercase;
  color: var(--muted); margin-top: 12px; opacity: 0;
}

/* ══════════════════════════════════════════════════════════════════════════
   7. BRB — ESL-style broadcast break screen
══════════════════════════════════════════════════════════════════════════ */
.overlay-brb {
  position: absolute; inset: 0; z-index: 100; opacity: 0;
  background: var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

/* center content stack */
.brb-content {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  position: relative; z-index: 20;
}
.brb-logo-img {
  width: 180px; height: 180px; object-fit: contain;
  animation: logoPulse 3.5s ease-in-out infinite;
  display: block;
}
.brb-brand {
  font-family: var(--f-display); font-size: 88px; font-weight: 900;
  letter-spacing: 18px; text-transform: uppercase; color: #fff;
  margin-top: 12px; line-height: 1;
}
.brb-rule {
  display: flex; align-items: center; gap: 20px;
  width: 480px; margin: 24px 0 20px;
}
.brb-rule-line { flex: 1; height: 1px; background: rgba(255,77,0,0.35); }
.brb-rule-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--acc); box-shadow: 0 0 12px var(--acc); flex-shrink: 0; }
.brb-status {
  font-family: var(--f-mono); font-size: 12px; font-weight: 600;
  letter-spacing: 9px; text-transform: uppercase; color: var(--sub);
}
.brb-sub-text {
  font-family: var(--f-mono); font-size: 11px; font-weight: 400;
  letter-spacing: 3px; color: var(--muted); margin-top: 10px;
}
.brb-dots { display: flex; gap: 12px; margin-top: 44px; }
.brb-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); opacity: 0.25; }

/* bottom info bar */
.brb-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 54px;
  background: rgba(255,77,0,0.05);
  border-top: 1px solid rgba(255,77,0,0.18);
  display: flex; align-items: center; gap: 14px;
  padding: 0 44px; z-index: 20;
}
.brb-bottom::before {
  content: ''; position: absolute; top: -2px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--acc) 25%, var(--acc) 75%, transparent);
  box-shadow: 0 0 24px var(--acc-glow);
}
.brb-bottom-logo { width: 26px; height: 26px; object-fit: contain; filter: drop-shadow(0 0 6px var(--acc-glow)); }
.brb-bottom-name {
  font-family: var(--f-display); font-size: 17px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.75);
}
.brb-bottom-spacer { flex: 1; }
.brb-bottom-url {
  font-family: var(--f-mono); font-size: 11px; color: rgba(255,255,255,0.28);
  letter-spacing: 2px;
}

/* ══════════════════════════════════════════════════════════════════════════
   8. SCORE BOARD
══════════════════════════════════════════════════════════════════════════ */
.overlay-score {
  position: absolute; top: 28px; left: 50%;
  transform: translateX(-50%); z-index: 60; opacity: 0;
}
.sc-wrap {
  display: flex; align-items: stretch;
  background: rgba(7,7,14,0.97);
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  overflow: hidden;
}
.sc-team { padding: 14px 28px; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 200px; position: relative; }
.sc-team.ct { background: rgba(77,139,255,0.06); border-right: 1px solid rgba(77,139,255,0.15); }
.sc-team.t  { background: rgba(255,140,0,0.06);  border-left:  1px solid rgba(255,140,0,0.15); }
.sc-team.ct::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--ct); }
.sc-team.t::before  { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--t); }
.sc-side { font-family: var(--f-mono); font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
.sc-team.ct .sc-side { color: var(--ct); }
.sc-team.t  .sc-side { color: var(--t); }
.sc-name { font-family: var(--f-display); font-size: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.sc-score { font-family: var(--f-mono); font-size: 52px; font-weight: 600; line-height: 1; letter-spacing: -2px; }
.sc-team.ct .sc-score { color: var(--ct); text-shadow: 0 0 30px rgba(77,139,255,0.4); }
.sc-team.t  .sc-score { color: var(--t);  text-shadow: 0 0 30px rgba(255,140,0,0.4); }
.sc-mid {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 14px 22px; gap: 2px;
  border-left: 1px solid rgba(255,255,255,0.05);
  border-right: 1px solid rgba(255,255,255,0.05);
}
.sc-map  { font-family: var(--f-display); font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.7); }
.sc-live { font-family: var(--f-mono); font-size: 9px; font-weight: 600; letter-spacing: 3px; color: var(--acc); text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
.sc-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--acc); box-shadow: 0 0 6px var(--acc); }

/* ══════════════════════════════════════════════════════════════════════════
   9. CLIP IT
══════════════════════════════════════════════════════════════════════════ */
.overlay-clip { position: absolute; top: 36px; right: 48px; z-index: 70; opacity: 0; }
.cl-wrap { display: flex; align-items: center; gap: 0; filter: drop-shadow(0 8px 32px rgba(255,77,0,0.5)); }
.cl-icon-box {
  background: var(--acc); width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  clip-path: polygon(0 0, 100% 0, calc(100% - 16px) 100%, 0 100%);
  font-size: 30px; padding-right: 12px;
}
.cl-text-box {
  background: rgba(7,7,14,0.97); border: 1px solid rgba(255,77,0,0.4); border-left: none;
  padding: 14px 32px 14px 20px;
  clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
}
.cl-label { font-family: var(--f-mono); font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--acc); text-transform: uppercase; }
.cl-main  { font-family: var(--f-display); font-size: 26px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #fff; line-height: 1; }

/* ══════════════════════════════════════════════════════════════════════════
   10. COUNTDOWN
══════════════════════════════════════════════════════════════════════════ */
.overlay-countdown {
  position: absolute; inset: 0; z-index: 95; opacity: 0;
  background: rgba(7,7,14,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px; overflow: hidden;
}
.cd-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,77,0,0.06) 0%, transparent 70%); }
.cd-eyebrow { font-family: var(--f-mono); font-size: 11px; font-weight: 600; letter-spacing: 8px; text-transform: uppercase; color: var(--muted); position: relative; }
.cd-ring-wrap { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; }
.cd-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.cd-ring-bg { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 3; }
.cd-ring-fg { fill: none; stroke: var(--acc); stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 0 10px var(--acc)); }
.cd-num { font-family: var(--f-display); font-size: 200px; font-weight: 900; letter-spacing: -10px; line-height: 1; color: var(--acc); text-shadow: 0 0 100px rgba(255,77,0,0.4); position: relative; z-index: 1; }
.cd-sub { font-family: var(--f-mono); font-size: 13px; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--muted); position: relative; }

/* ══════════════════════════════════════════════════════════════════════════
   11. AD BREAK — ESL-style branded commercial screen
══════════════════════════════════════════════════════════════════════════ */
.overlay-ad {
  position: absolute; inset: 0; z-index: 100; opacity: 0;
  background: var(--dark);

<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ysceuihdsatttnpnypjx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qST7eQaiw0uOqcFQ95DIWw__XtiMbHf';
const CHANNEL_NAME = 'obs-overlay';
const root = document.getElementById('root');

CustomEase.create('snap', 'M0,0 C0.4,0 0.7,0.6 1,1');

// ── UTILS ─────────────────────────────────────────────────────────────────────
const make = (cls, html) => { const e=document.createElement('div'); e.className=cls; e.innerHTML=html; return e; };
const kill = (el, dur=0.4) => { if (!el?.parentNode) return; gsap.to(el,{opacity:0,duration:dur,ease:'power2.in',onComplete:()=>el.remove()}); };
const killClass = cls => root.querySelectorAll('.'+cls).forEach(e => kill(e));
const rgb = hex => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `${r},${g},${b}`; };

// Shared atmospheric HTML (injected into BRB and Ad)
const ATM = `
  <div class="atm-rays"></div>
  <div class="atm-glow"></div>
  <div class="atm-vignette"></div>
  <div class="atm-scanlines"></div>
`;

// ── WEB AUDIO ─────────────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  const ac = () => { if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); return ctx; };
  const osc = (f,t,g,a,d,s) => { const c=ac(),G=c.createGain(),O=c.createOscillator(); O.type=t; O.frequency.setValueAtTime(f,s); G.gain.setValueAtTime(0,s); G.gain.linearRampToValueAtTime(g,s+a); G.gain.exponentialRampToValueAtTime(0.001,s+a+d); O.connect(G); G.connect(c.destination); O.start(s); O.stop(s+a+d+.05); };
  const ns = (d,g,s) => { const c=ac(),b=c.createBuffer(1,c.sampleRate*d,c.sampleRate),D=b.getChannelData(0); for(let i=0;i<D.length;i++)D[i]=(Math.random()*2-1); const sr=c.createBufferSource(); sr.buffer=b; const G=c.createGain(),f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; G.gain.setValueAtTime(g,s); G.gain.exponentialRampToValueAtTime(0.001,s+d); sr.connect(f); f.connect(G); G.connect(c.destination); sr.start(s); sr.stop(s+d); };
  return {
    alert()  { const t=ac().currentTime; osc(220,'sawtooth',.25,.01,.1,t); osc(440,'square',.15,.01,.12,t+.05); osc(880,'sine',.2,.02,.3,t+.12); ns(.08,.12,t); },
    popup()  { const t=ac().currentTime; osc(660,'sine',.18,.01,.2,t); osc(880,'sine',.12,.01,.15,t+.08); },
    hype()   { const t=ac().currentTime; [180,240,320,440,600].forEach((f,i)=>{osc(f,'sawtooth',.16,.02,.3,t+i*.06);}); ns(.15,.18,t); },
    gg()     { const t=ac().currentTime; [523,659,784,1047].forEach((f,i)=>{osc(f,'sine',.16,.02,.4,t+i*.1);}); },
    clip()   { const t=ac().currentTime; osc(1047,'sine',.22,.005,.12,t); osc(1319,'sine',.16,.005,.1,t+.08); ns(.05,.08,t); },
    tick()   { const t=ac().currentTime; osc(440,'sine',.2,.01,.12,t); },
    go()     { const t=ac().currentTime; osc(523,'sine',.25,.01,.3,t); osc(784,'sine',.18,.01,.4,t+.06); osc(1047,'sine',.22,.01,.5,t+.14); },
  };
})();

// ── SUPABASE ──────────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
sb.channel(CHANNEL_NAME, { config: { broadcast: { self: false } } })

function handleTrigger({ overlay, data = {} }) {
  const map = {
    banner:     showBanner,
    lower:      showLower,
    popup:      showPopup,
    alert:      showAlert,
    hype:       showHype,
    gg:         showGG,
    brb:        showBRB,
    score:      showScore,
    score_hide: () => killClass('overlay-score'),
    clip:       showClip,
    countdown:  showCountdown,
    ad:         showAd,
  };
  map[overlay]?.(data);
}

// ── 1. BANNER ─────────────────────────────────────────────────────────────────
function showBanner({ messages, text='Arhaval CS2 Turnuva Yayını', label='CANLI', duration=12, color='#FF4D00' }={}) {
  killClass('overlay-banner');
  const msgs = messages || [{ label, text }];
  let msgIdx = 0, cycleTimer = null;
  const el = make('overlay-banner', `
    <div class="bn-badge"><img src="logo.png" alt="Arhaval"></div>
    <div class="bn-sep"></div>
    <div class="bn-body">
      <div class="bn-label">${msgs[0].label || label}</div>
      <div class="bn-text">${msgs[0].text || text}</div>
    </div>
    <div class="bn-right">
      <div class="bn-live-label">LIVE</div>
      <div class="bn-live-dot"></div>
    </div>
    <div class="bn-bar"><div class="bn-bar-fill"></div></div>
  `);
  el.style.borderTopColor                           = color;
  el.querySelector('.bn-badge').style.background    = color;
  el.querySelector('.bn-label').style.color         = color;
  el.querySelector('.bn-live-dot').style.background = color;
  el.querySelector('.bn-bar-fill').style.background = color;
  root.appendChild(el);
  const body  = el.querySelector('.bn-body');
  const right = el.querySelector('.bn-right');
  const fill  = el.querySelector('.bn-bar-fill');
  // Entry: banner reveals upward → body text wipes right → live badge
  gsap.to(el,    { clipPath:'inset(0 0 0% 0)',  duration:0.28, ease:'power3.out' });
  gsap.to(body,  { clipPath:'inset(0 0% 0 0)',  duration:0.26, ease:'power2.out', delay:0.16 });
  gsap.to(right, { clipPath:'inset(0 0% 0 0)',  duration:0.2,  ease:'power2.out', delay:0.3  });
  // Progress bar drains → banner collapses
  gsap.to(fill, { scaleX:0, duration, ease:'none', transformOrigin:'left',
    onComplete: () => {
      if (cycleTimer) clearTimeout(cycleTimer);
      gsap.to(el, { clipPath:'inset(0 0 100% 0)', duration:0.2, ease:'power2.in', onComplete:()=>el.remove() });
    }
  });
  // Text cycling
  if (msgs.length > 1) {
    const slotMs = (duration / msgs.length) * 1000;
    const labelEl = el.querySelector('.bn-label');
    const textEl  = el.querySelector('.bn-text');
    const cycleNext = () => {
      msgIdx = (msgIdx + 1) % msgs.length;
      const next = msgs[msgIdx];
      gsap.to(body, { clipPath:'inset(0 100% 0 0)', duration:0.16, ease:'power2.in',
        onComplete: () => {
          labelEl.textContent = next.label || label;
          textEl.textContent  = next.text  || text;
          gsap.fromTo(body, { clipPath:'inset(0 100% 0 0)' }, { clipPath:'inset(0 0% 0 0)', duration:0.22, ease:'power2.out' });
        }
      });
      if (el.parentNode) cycleTimer = setTimeout(cycleNext, slotMs);
    };
    cycleTimer = setTimeout(cycleNext, slotMs);
  }
}

function showLower({ name='Arhaval', sub='CS2 · Turnuva', tag='YAYINCI', color='#FF4D00', duration=6 }={}) {

function showAlert({ text='CLUTCH!', label='ARHAVAL · ALERT', duration=4, color='#FF4D00' }={}) {
  const el = make('overlay-alert', `
    <div class="al-backdrop"></div>
    <div class="al-ring r1"></div><div class="al-ring r2"></div><div class="al-ring r3"></div>

  el.querySelectorAll('.al-ring').forEach(r => r.style.borderColor = c);
  el.querySelector('.al-box').style.borderColor = `rgba(${rgb(c)},0.4)`;

    .to(rings[0], { scale:7, opacity:0, duration:.9, ease:'power2.out' }, 0)
    .to(rings[1], { scale:12, opacity:0, duration:1.2, ease:'power2.out' }, .08)
    .to(rings[2], { scale:18, opacity:0, duration:1.5, ease:'power2.out' }, .16);

  spawnParticles(el.querySelector('.al-particles'), c);

function spawnParticles(c, color) {
  for (let i=0; i<40; i++) {
    const p = document.createElement('div'); p.className='al-particle';
    const sz=3+Math.random()*10, ang=(Math.random()*360)*Math.PI/180, dist=100+Math.random()*300;
    p.style.cssText=`left:${45+Math.random()*10}%;top:${40+Math.random()*20}%;width:${sz}px;height:${sz}px;background:${Math.random()>.3?color:'#fff'};border-radius:${Math.random()>.4?'50%':'2px'};`;
    c.appendChild(p);
    gsap.fromTo(p,{opacity:1,x:0,y:0,scale:1},{opacity:0,x:Math.cos(ang)*dist,y:Math.sin(ang)*dist,scale:0,rotation:Math.random()*360,duration:.7+Math.random()*.9,delay:Math.random()*.2,ease:'power2.out'});
  }
}

function showHype({ text='HYPE!', duration=3, color='#FF4D00' }={}) {

    .fromTo(glow,{opacity:.8,scale:1.3},{opacity:0,scale:2.2,duration:.9,ease:'power2.out'},0)
    .fromTo(lines,{opacity:.5,scale:.8},{opacity:0,scale:2,duration:.8,ease:'power2.out'},0);

// ── 6. GG ─────────────────────────────────────────────────────────────────────
function showGG({ label='MATCH OVER', sub='Good game · Well played', duration=6 }={}) {

    <div class="gg-eyebrow">${label}</div>

  gsap.to(el,{opacity:1,duration:0});

  gsap.fromTo(el.querySelector('.gg-eyebrow'),{opacity:0,y:-20},{opacity:1,y:0,duration:.5,ease:'power2.out',delay:.3});
  gsap.fromTo(el.querySelector('.gg-sub'),{opacity:0,y:20},{opacity:1,y:0,duration:.5,ease:'power2.out',delay:.5});

function launchConfetti(wrap) {

  for(let i=0;i<100;i++){

    p.style.cssText=`left:${10+Math.random()*80}%;top:-20px;background:${col};width:${6+Math.random()*12}px;height:${10+Math.random()*16}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(p);
    gsap.to(p,{y:1200+Math.random()*200,x:(Math.random()-.5)*500,rotation:(Math.random()-.5)*720,opacity:[{value:1},{value:0,delay:.7}],duration:2+Math.random()*3,delay:Math.random()*1.8,ease:'power1.in'});
  }
}

function showScore({ team1='ARHAVAL', team2='RIVAL', score1=0, score2=0, map='MIRAGE', duration=0 }={}) {

      </div>
      <div class="sc-team t">
        <div class="sc-side">T</div>
        <div class="sc-name">${team2}</div>
        <div class="sc-score">${String(score2).padStart(2,'0')}</div>
      </div>
    </div>
  `);
  root.appendChild(el);
  gsap.set(el, { opacity:0, y:-20, scale:.96 });
  gsap.to(el, { opacity:1, y:0, scale:1, duration:.45, ease:'back.out(1.8)' });
  gsap.to(el.querySelector('.sc-live-dot'), { opacity:.2, duration:.7, repeat:-1, yoyo:true, ease:'sine.inOut' });
  if (duration > 0) setTimeout(()=>kill(el,.4), duration*1000);
}

// ── 9. CLIP ───────────────────────────────────────────────────────────────────
function showClip({ text='CLIP IT!', sub='Anı kaydet', duration=3, color='#FF4D00' }={}) {
  const el = make('overlay-clip', `
    <div class="cl-wrap">
      <div class="cl-icon-box">🎬</div>
      <div class="cl-text-box">
        <div class="cl-label">ARHAVAL</div>
        <div class="cl-main">${text}</div>
      </div>
    </div>
  `);
  el.querySelector('.cl-icon-box').style.background = color;
  el.querySelector('.cl-text-box').style.borderColor = `rgba(${rgb(color)},.4)`;
  el.querySelector('.cl-label').style.color = color;
  root.appendChild(el);
  SFX.clip();
  gsap.set(el,{opacity:0,x:60,y:-10});
  gsap.to(el,{opacity:1,x:0,y:0,duration:.4,ease:'back.out(2)'});
  setTimeout(()=>gsap.to(el,{opacity:0,x:60,duration:.4,ease:'power2.in',onComplete:()=>el.remove()}),duration*1000);
}

// ── 10. COUNTDOWN ─────────────────────────────────────────────────────────────
function showCountdown({ from=5, label='Maç Başlıyor', sub='ARHAVAL', color='#FF4D00' }={}) {
  const ex = root.querySelector('.overlay-countdown');
  if (ex) { kill(ex, .3); return; }
  const circ = 2*Math.PI*130;
  const el = make('overlay-countdown', `
    <div class="cd-bg"></div>
    <div class="cd-eyebrow">${label}</div>
    <div class="cd-ring-wrap">
      <svg viewBox="0 0 300 300" width="300" height="300">
        <circle class="cd-ring-bg" cx="150" cy="150" r="130"/>
        <circle class="cd-ring-fg" cx="150" cy="150" r="130"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="0"/>
      </svg>
      <div class="cd-num">${from}</div>
    </div>
    <div class="cd-sub">${sub}</div>
  `);
  el.querySelector('.cd-ring-fg').style.stroke = color;
  el.querySelector('.cd-ring-fg').style.filter = `drop-shadow(0 0 10px ${color})`;
  el.querySelector('.cd-num').style.color = color;
  el.querySelector('.cd-num').style.textShadow = `0 0 100px rgba(${rgb(color)},.4)`;
  root.appendChild(el);
  gsap.to(el,{opacity:1,duration:.4,ease:'power2.out'});

  let rem=from;
  const numEl=el.querySelector('.cd-num'), ringEl=el.querySelector('.cd-ring-fg');
  SFX.tick();
  gsap.fromTo(numEl,{scale:1.5,opacity:.3},{scale:1,opacity:1,duration:.35,ease:'back.out(2)'});
  const iv=setInterval(()=>{
    rem--;
    if(!el.parentNode){clearInterval(iv);return;}
    if(rem<=0){
      clearInterval(iv);
      numEl.textContent='GO!'; numEl.style.color='#00E5A0'; numEl.style.textShadow='0 0 120px rgba(0,229,160,.6)';
      SFX.go();
      gsap.fromTo(numEl,{scale:1.8,opacity:0},{scale:1,opacity:1,duration:.5,ease:'back.out(2)'});
      setTimeout(()=>kill(el,.6),2000);
    } else {
      numEl.textContent=rem;
      ringEl.style.strokeDashoffset=circ*(1-rem/from);
      SFX.tick();
      gsap.fromTo(numEl,{scale:1.4,opacity:.3},{scale:1,opacity:1,duration:.3,ease:'back.out(2)'});
    }
  },1000);
}

// ── 11. AD BREAK ──────────────────────────────────────────────────────────────
function showAd({ duration=15, title='Arhaval', subtitle='İzlediğin için teşekkürler!', badge='REKLAM ARASI', color='#FF4D00' }={}) {
  const circ = 282;
  const el = make('overlay-ad', `
    ${ATM}
    <div class="ad-top-line"></div>
    <div class="ad-progress"><div class="ad-progress-fill"></div></div>
    <div class="ad-badge"><div class="ad-badge-dot"></div>${badge}</div>
    <img class="ad-logo-img" src="logo.png" alt="Arhaval">
    <div class="ad-brand">${title.toUpperCase()}</div>
    <div class="ad-sub">${subtitle}</div>
    <div class="ad-ring-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110">
        <circle class="ad-ring-bg" cx="55" cy="55" r="46"/>
        <circle class="ad-ring-fg" cx="55" cy="55" r="46"
          stroke-dasharray="${circ}" stroke-dashoffset="0"/>
      </svg>
      <div class="ad-ring-num">${duration}</div>
    </div>
  `);

  // apply color
  ['.ad-top-line'].forEach(s => el.querySelector(s).style.background = `linear-gradient(90deg,transparent,${color} 25%,${color} 75%,transparent)`);
  el.querySelector('.ad-badge').style.color = color;
  el.querySelector('.ad-badge').style.borderColor = `rgba(${rgb(color)},.28)`;
  el.querySelector('.ad-badge').style.background = `rgba(${rgb(color)},.07)`;
  el.querySelector('.ad-badge-dot').style.background = color;
  el.querySelector('.ad-badge-dot').style.boxShadow = `0 0 10px ${color}`;
  el.querySelector('.ad-ring-fg').style.stroke = color;
  el.querySelector('.ad-ring-fg').style.filter = `drop-shadow(0 0 8px ${color})`;
  el.querySelector('.ad-ring-num').style.color = color;
  el.querySelector('.ad-progress-fill').style.background = color;
  el.querySelector('.ad-progress-fill').style.boxShadow = `4px 0 20px rgba(${rgb(color)},.8)`;

  root.appendChild(el);

  const badge_el  = el.querySelector('.ad-badge');
  const logo_el   = el.querySelector('.ad-logo-img');
  const brand_el  = el.querySelector('.ad-brand');
  const sub_el    = el.querySelector('.ad-sub');
  const ring_wrap = el.querySelector('.ad-ring-wrap');
  const ring_fg   = el.querySelector('.ad-ring-fg');
  const ring_num  = el.querySelector('.ad-ring-num');
  const fill      = el.querySelector('.ad-progress-fill');

  const tl = gsap.timeline();
  tl.to(el,       { opacity:1, duration:.7, ease:'power2.out' })
    .fromTo(badge_el,  { y:-24, opacity:0 }, { y:0, opacity:1, duration:.5, ease:'power3.out' }, .1)
    .fromTo(logo_el,   { scale:.6, opacity:0, filter:'blur(16px)' }, { scale:1, opacity:1, filter:'blur(0px)', duration:.9, ease:'back.out(1.5)' }, .2)
    .fromTo(brand_el,  { y:28, opacity:0 }, { y:0, opacity:1, duration:.6, ease:'back.out(2)' }, .55)
    .fromTo(sub_el,    { y:16, opacity:0 }, { y:0, opacity:1, duration:.5, ease:'power3.out' }, .72)
    .fromTo(ring_wrap, { scale:.4, opacity:0 }, { scale:1, opacity:1, duration:.6, ease:'back.out(2)' }, .85);

  gsap.to(fill, { scaleX:0, duration, ease:'none', transformOrigin:'left' });

  let rem = duration;
  const iv = setInterval(() => {
    rem--;
    if (ring_num) ring_num.textContent = rem;
    if (ring_fg)  ring_fg.style.strokeDashoffset = circ*(1-rem/duration);
    if (rem <= 0) { clearInterval(iv); kill(el, .8); }
  }, 1000);
}
