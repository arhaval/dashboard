<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arhaval OBS Overlay</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1920px; height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }

  :root {
    --accent:      #FF4D00;
    --accent-glow: rgba(255, 77, 0, 0.6);
    --dark:        rgba(0, 0, 0, 0.88);
    --border:      rgba(255, 255, 255, 0.15);
  }

  #root { position: absolute; inset: 0; pointer-events: none; }

  /* ── 1. FULL-SCREEN AD ── */
  .overlay-ad {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px;
    animation: fadeIn .4s ease; z-index: 100;
  }
  .overlay-ad .ad-badge {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent);
    border: 1px solid var(--accent); padding: 6px 16px; border-radius: 4px;
    animation: blink 2s infinite;
  }
  .overlay-ad .ad-title {
    font-size: 72px; font-weight: 800; letter-spacing: -2px;
    text-align: center; line-height: 1;
    text-shadow: 0 0 60px var(--accent-glow);
    animation: slideUp .5s ease .1s both;
  }
  .overlay-ad .ad-title span { color: var(--accent); }
  .overlay-ad .ad-sub {
    font-size: 24px; color: rgba(255,255,255,.6);
    animation: slideUp .5s ease .2s both;
  }
  .overlay-ad .ad-count {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: var(--accent);
    box-shadow: 0 0 30px var(--accent-glow);
    animation: slideUp .5s ease .3s both;
  }
  .overlay-ad .ad-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: var(--accent); transform-origin: left;
    animation: shrink var(--dur, 15s) linear forwards;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* ── 2. BOTTOM BANNER ── */
  .overlay-banner {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(90deg, rgba(0,0,0,.95) 0%, rgba(255,77,0,.12) 50%, rgba(0,0,0,.95) 100%);
    border-top: 2px solid var(--accent);
    display: flex; align-items: center; padding: 0 48px; gap: 24px;
    animation: slideUpEl .5s cubic-bezier(.34,1.56,.64,1) both; z-index: 50;
  }
  .overlay-banner .b-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
    flex-shrink: 0; animation: blink 1.5s infinite;
  }
  .overlay-banner .b-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent); flex-shrink: 0;
  }
  .overlay-banner .b-div { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
  .overlay-banner .b-text { font-size: 22px; font-weight: 500; flex: 1; }

  /* ── 3. CORNER POPUP ── */
  .overlay-popup {
    position: absolute; bottom: 100px; right: 40px; width: 380px;
    background: var(--dark); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 8px;
    padding: 20px 24px;
    animation: slideInRight .4s cubic-bezier(.34,1.56,.64,1) both; z-index: 50;
    box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(255,77,0,.1);
  }
  .overlay-popup .p-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
  .overlay-popup .p-text { font-size: 18px; font-weight: 500; line-height: 1.4; }
  .overlay-popup .p-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); border-radius: 0 0 8px 8px;
    transform-origin: left; animation: shrink 6s linear forwards;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* ── 4. CENTER ALERT ── */
  .overlay-alert {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; z-index: 90;
  }
  .overlay-alert .a-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,77,0,.18) 0%, transparent 70%);
    animation: fadeIn .5s ease;
  }
  .overlay-alert .a-box {
    position: relative; background: var(--dark);
    border: 1px solid var(--accent); border-radius: 12px;
    padding: 48px 80px;
    box-shadow: 0 0 0 1px var(--accent-glow), 0 0 80px var(--accent-glow), 0 40px 80px rgba(0,0,0,.6);
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .overlay-alert .a-label {
    font-size: 12px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
  }
  .overlay-alert .a-text {
    font-size: 52px; font-weight: 800; letter-spacing: -1px;
    text-shadow: 0 0 40px var(--accent-glow); max-width: 800px;
  }
  .a-particles { position: absolute; inset: -40px; pointer-events: none; }
  .particle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: fly var(--d,.8s) ease-out var(--delay,0s) forwards;
  }

  /* ── 5. HYPE ── */
  .overlay-hype {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 80; animation: fadeIn .3s ease;
  }
  .overlay-hype .h-text {
    font-size: 180px; font-weight: 900; letter-spacing: -8px;
    text-transform: uppercase; color: transparent;
    -webkit-text-stroke: 3px var(--accent);
    text-shadow: 0 0 80px var(--accent-glow);
    animation: popIn .8s cubic-bezier(.34,1.56,.64,1) both;
  }

  /* ── 6. GG ── */
  .overlay-gg {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); text-align: center; z-index: 80;
  }
  .overlay-gg .g-label {
    font-size: 14px; font-weight: 700; letter-spacing: 6px;
    text-transform: uppercase; color: rgba(255,255,255,.4);
    animation: slideUp .4s ease;
  }
  .overlay-gg .g-text {
    font-size: 160px; font-weight: 900; color: var(--accent);
    text-shadow: 0 0 100px var(--accent-glow); line-height: .9;
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;
  }

  /* ── 7. BRB ── */
  .overlay-brb {
    position: absolute; inset: 0; background: rgba(0,0,0,.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    animation: fadeIn .5s ease; z-index: 100;
  }
  .overlay-brb .r-title {
    font-size: 96px; font-weight: 900; letter-spacing: -4px;
  }
  .overlay-brb .r-title span { color: var(--accent); }
  .overlay-brb .r-sub { font-size: 22px; color: rgba(255,255,255,.5); letter-spacing: 2px; }
  .overlay-brb .r-dots { display: flex; gap: 12px; margin-top: 8px; }
  .overlay-brb .r-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); animation: blink 1.5s infinite;
  }
  .overlay-brb .r-dot:nth-child(2) { animation-delay: .3s; }
  .overlay-brb .r-dot:nth-child(3) { animation-delay: .6s; }

  /* ── KEYFRAMES ── */
  @keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
  @keyframes fadeOut   { from { opacity:1 } to { opacity:0 } }
  @keyframes slideUp   { from { opacity:0; transform:translateY(30px) } to { opacity:1; transform:translateY(0) } }
  @keyframes slideUpEl { from { transform:translateY(100%) } to { transform:translateY(0) } }
  @keyframes slideDown { from { transform:translateY(0) } to { transform:translateY(100%) } }
  @keyframes slideInRight  { from { opacity:0; transform:translateX(120%) } to { opacity:1; transform:translateX(0) } }
  @keyframes slideOutRight { from { opacity:1; transform:translateX(0) } to { opacity:0; transform:translateX(120%) } }
  @keyframes shrink    { from { transform:scaleX(1) } to { transform:scaleX(0) } }
  @keyframes blink     { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes popIn     { from { opacity:0; transform:scale(.5) } to { opacity:1; transform:scale(1) } }
  @keyframes fly {
    0%   { opacity:1; transform:translate(0,0) scale(1) }
    100% { opacity:0; transform:translate(var(--tx,40px),var(--ty,-80px)) scale(0) }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://ysceuihdsatttnpnypjx.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_qST7eQaiw0uOqcFQ95DIWw__XtiMbHf';
const CHANNEL_NAME  = 'obs-overlay';
const root = document.getElementById('root');

// ── SUPABASE REALTIME ────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const channel = sb.channel(CHANNEL_NAME, {
  config: { broadcast: { self: false } }
});

channel
  .on('broadcast', { event: 'trigger' }, ({ payload }) => {
    console.log('[Overlay] Trigger:', payload);
    handleTrigger(payload);
  })
  .subscribe((status) => {
    console.log('[Overlay] Kanal durumu:', status);
  });

// ── TRIGGER HANDLER ──────────────────────────────────────────────────────────
function handleTrigger({ overlay, data = {} }) {
  switch (overlay) {
    case 'ad':     showAd(data);     break;
    case 'banner': showBanner(data); break;
    case 'popup':  showPopup(data);  break;
    case 'alert':  showAlert(data);  break;
    case 'hype':   showHype(data);   break;
    case 'gg':     showGG(data);     break;
    case 'brb':    showBRB(data);    break;
  }
}

// ── 1. AD ────────────────────────────────────────────────────────────────────
function showAd({ duration = 15, title = 'Arhaval', subtitle = 'İzlediğin için teşekkürler!' } = {}) {
  const el = make('div', 'overlay-ad', `
    <div class="ad-badge">🔴 REKLAM ARASI</div>
    <div class="ad-title">${title.replace(/(\S+)$/, '<span>$1</span>')}</div>
    <div class="ad-sub">${subtitle}</div>
    <div class="ad-count" id="adc">${duration}</div>
    <div class="ad-bar" style="--dur:${duration}s"></div>
  `);
  root.appendChild(el);
  let r = duration;
  const t = setInterval(() => { r--; const c=el.querySelector('#adc'); if(c) c.textContent=r; if(r<=0){clearInterval(t);dismiss(el,'fadeOut',.5);} }, 1000);
}

// ── 2. BANNER ────────────────────────────────────────────────────────────────
function showBanner({ text = 'Arhaval ile izliyorsunuz!', duration = 8 } = {}) {
  root.querySelectorAll('.overlay-banner').forEach(b => b.remove());
  const el = make('div', 'overlay-banner', `
    <div class="b-dot"></div>
    <div class="b-label">Arhaval</div>
    <div class="b-div"></div>
    <div class="b-text">${text}</div>
  `);
  root.appendChild(el);
  setTimeout(() => dismiss(el, 'slideDown', .5), duration * 1000);
}

// ── 3. POPUP ─────────────────────────────────────────────────────────────────
function showPopup({ text = '🎉 Yeni bildirim!', title = 'BİLDİRİM', duration = 6 } = {}) {
  root.querySelectorAll('.overlay-popup').forEach(p => {
    p.style.bottom = (parseInt(p.style.bottom || '100') + 160) + 'px';
  });
  const el = make('div', 'overlay-popup', `
    <div class="p-title">${title}</div>
    <div class="p-text">${text}</div>
    <div class="p-bar" style="animation-duration:${duration}s"></div>
  `);
  root.appendChild(el);
  setTimeout(() => dismiss(el, 'slideOutRight', .4), duration * 1000);
}

// ── 4. ALERT ─────────────────────────────────────────────────────────────────
function showAlert({ text = '⚡ ALERT!', duration = 4 } = {}) {
  const el = make('div', 'overlay-alert', `
    <div class="a-bg"></div>
    <div class="a-box">
      <div class="a-label">⚡ ARHAVAL ALERT</div>
      <div class="a-text">${text}</div>
      <div class="a-particles"></div>
    </div>
  `);
  root.appendChild(el);
  spawnParticles(el.querySelector('.a-particles'));
  setTimeout(() => dismiss(el, 'fadeOut', .5), duration * 1000);
}

function spawnParticles(c) {
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const a = Math.random() * 360, r = 100 + Math.random() * 200, rad = a * Math.PI / 180;
    p.style.cssText = `left:${40+Math.random()*20}%;top:${40+Math.random()*20}%;--tx:${Math.cos(rad)*r}px;--ty:${Math.sin(rad)*r}px;--d:${.6+Math.random()*.8}s;--delay:${Math.random()*.3}s;background:${Math.random()>.5?'#FF4D00':'#fff'}`;
    c.appendChild(p);
  }
}

// ── 5. HYPE ──────────────────────────────────────────────────────────────────
function showHype({ duration = 3 } = {}) {
  const el = make('div', 'overlay-hype', `<div class="h-text">HYPE!</div>`);
  root.appendChild(el);
  setTimeout(() => dismiss(el, 'fadeOut', .5), duration * 1000);
}

// ── 6. GG ────────────────────────────────────────────────────────────────────
function showGG({ duration = 4 } = {}) {
  const el = make('div', 'overlay-gg', `
    <div class="g-label">Match Over</div>
    <div class="g-text">GG</div>
  `);
  root.appendChild(el);
  setTimeout(() => dismiss(el, 'fadeOut', .6), duration * 1000);
}

// ── 7. BRB ───────────────────────────────────────────────────────────────────
function showBRB({ text = 'Hemen Geri Dönüyorum' } = {}) {
  const existing = root.querySelector('.overlay-brb');
  if (existing) { dismiss(existing, 'fadeOut', .4); return; } // ikinci basışta kapatır
  const el = make('div', 'overlay-brb', `
    <div class="r-title">Be <span>Right</span> Back</div>
    <div class="r-sub">${text}</div>
    <div class="r-dots"><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div></div>
  `);
  root.appendChild(el);
}

// ── YARDIMCILAR ──────────────────────────────────────────────────────────────
function make(tag, cls, html) {
  const el = document.createElement(tag);
  el.className = cls;
  el.innerHTML = html;
  return el;
}

function dismiss(el, anim, dur) {
  if (!el?.parentNode) return;
  el.style.animation = `${anim} ${dur}s ease forwards`;
  setTimeout(() => el.remove(), dur * 1000);
}

// ── TEST MODU (?test=1) ───────────────────────────────────────────────────────
if (new URLSearchParams(location.search).get('test') === '1') {
  const demos = [
    () => showBanner({ text: 'Arhaval ile CS2 izliyorsunuz!' }),
    () => showPopup({ text: 'Hoşgeldin! 🎉', title: 'BİLDİRİM' }),
    () => showAlert({ text: 'CLUTCH KAZANDI!' }),
    () => showHype(),
    () => showGG(),
    () => showAd({ duration: 8, title: 'Arhaval Espor', subtitle: 'CS2 Turnuva Yayını' }),
  ];
  let i = 0;
  const next = () => { if(i<demos.length) { demos[i++](); setTimeout(next, 5000); } };
  setTimeout(next, 1000);
}
</script>
</body>
</html>
