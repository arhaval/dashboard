<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arhaval OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ── RESET ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --acc:   #FF4D00;
  --blue:  #4D8BFF;
  --green: #00E676;
  --gold:  #FFD600;
  --dark:  #08080F;
  --surf:  #0D0D1A;
  --b:     rgba(255,255,255,0.07);
  --fd: 'Barlow Condensed', sans-serif;
  --fm: 'IBM Plex Mono', monospace;
}

body {
  width: 1920px; height: 1080px;
  background: transparent; overflow: hidden;
  font-family: var(--fd);
  color: #fff;
  -webkit-font-smoothing: antialiased;
}
#root { position: absolute; inset: 0; pointer-events: none; }

/* ═══════════════════════════════════════════════════════════════════════════
   1. TEAM STATS — PGL broadcast stat card
═══════════════════════════════════════════════════════════════════════════ */
.overlay-teamstats {
  position: absolute; inset: 0; z-index: 70;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}

.ts-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,6,0.90);
}

.ts-wrap {
  position: relative; z-index: 2;
  width: 1120px;
  display: flex; flex-direction: column;
}

/* ── Header bar ── */
.ts-hdr {
  height: 48px;
  background: var(--acc);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px;
}
.ts-hdr-label {
  font-family: var(--fm);
  font-size: 10px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: #000;
}
.ts-hdr-tag {
  font-family: var(--fm);
  font-size: 9px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(0,0,0,0.55);
}

/* ── Body ── */
.ts-body {
  display: grid;
  grid-template-columns: 1fr 72px 1fr;
  background: var(--dark);
  border-left: 3px solid var(--acc);
  border-right: 3px solid var(--blue);
  border-bottom: 1px solid var(--b);
}

/* ── Team panel ── */
.ts-team {
  padding: 28px 22px 32px;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.ts-team.left  { border-right: 1px solid var(--b); }
.ts-team.right { border-left:  1px solid var(--b); }

/* Logo */
.ts-logo {
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.ts-logo img { width: 80px; height: 80px; object-fit: contain; }
.ts-logo-init {
  font-family: var(--fd);
  font-size: 64px; font-weight: 900;
  text-transform: uppercase; line-height: 1;
}
.ts-team.left  .ts-logo-init { color: var(--acc); }
.ts-team.right .ts-logo-init { color: var(--blue); }

/* Team name */
.ts-name {
  font-family: var(--fd);
  font-size: 32px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px;
  color: #fff; text-align: center; line-height: 1;
  margin-bottom: 22px;
}

/* Stat boxes row */
.ts-stats {
  display: flex; gap: 3px; width: 100%;
}
.ts-stat {
  flex: 1; display: flex; flex-direction: column;
}

/* Colored header of each box */
.ts-stat-lbl {
  padding: 7px 6px 6px;
  text-align: center;
  font-family: var(--fm);
  font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
.ts-team.left  .ts-stat-lbl { background: var(--acc); color: #000; }
.ts-team.right .ts-stat-lbl { background: var(--blue); color: #fff; }

/* Number area */
.ts-stat-num {
  padding: 14px 6px;
  text-align: center;
  font-family: var(--fd);
  font-size: 54px; font-weight: 900;
  color: #fff; line-height: 1;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.04);
  border-top: none;
}
/* Points box — larger */
.ts-stat.pts .ts-stat-num {
  font-size: 76px;
  padding: 10px 6px;
}
.ts-team.left  .ts-stat.pts .ts-stat-num { color: var(--acc);  }
.ts-team.right .ts-stat.pts .ts-stat-num { color: var(--blue); }

/* ── VS column ── */
.ts-vs {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 7px;
  border-left: 1px solid var(--b);
  border-right: 1px solid var(--b);
}
.ts-vs-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
}
.ts-vs-text {
  font-family: var(--fd);
  font-size: 18px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.14);
}

/* ── Footer ── */
.ts-footer {
  height: 34px;
  background: rgba(0,0,0,0.65);
  border: 1px solid var(--b); border-top: none;
  display: flex; align-items: center; justify-content: center;
}
.ts-footer-text {
  font-family: var(--fm);
  font-size: 8px; font-weight: 600;
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(255,255,255,0.16);
}

/* ═══════════════════════════════════════════════════════════════════════════
   2. BANNER — full-width lower bar
═══════════════════════════════════════════════════════════════════════════ */
.overlay-banner {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 68px; z-index: 50; opacity: 0;
  display: flex; align-items: stretch;
}
.bn-accent {
  width: 5px;
  flex-shrink: 0;
}
.bn-body {
  flex: 1; display: flex; align-items: center;
  background: rgba(5,5,14,0.97);
  border-top: 1px solid var(--b);
  padding: 0 22px; gap: 18px;
}
.bn-live {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.bn-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  animation: blink 1.1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
.bn-live-tag {
  font-family: var(--fm);
  font-size: 9px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
}
.bn-divider {
  width: 1px; height: 26px;
  background: rgba(255,255,255,0.10);
  flex-shrink: 0;
}
.bn-text {
  font-family: var(--fd);
  font-size: 22px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  color: #fff; flex: 1;
}
.bn-sub {
  font-family: var(--fm);
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.30);
  flex-shrink: 0;
  letter-spacing: 2px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   3. LOWER THIRD
═══════════════════════════════════════════════════════════════════════════ */
.overlay-lower {
  position: absolute; bottom: 76px; left: 56px;
  z-index: 50; opacity: 0;
}
.lt-tag {
  display: inline-block;
  background: var(--acc);
  padding: 5px 14px;
  font-family: var(--fm);
  font-size: 9px; font-weight: 700;
  letter-spacing: 5px; text-transform: uppercase;
  color: #000;
}
.lt-name {
  display: block;
  font-family: var(--fd);
  font-size: 52px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px;
  color: #fff; line-height: 1;
  background: rgba(0,0,8,0.88);
  padding: 8px 14px 10px;
}
.lt-role {
  display: block;
  font-family: var(--fm);
  font-size: 10px; font-weight: 500;
  letter-spacing: 5px; text-transform: uppercase;
  color: rgba(255,255,255,0.40);
  background: rgba(0,0,8,0.78);
  padding: 6px 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* ═══════════════════════════════════════════════════════════════════════════
   4. SCORE BAR — top center
═══════════════════════════════════════════════════════════════════════════ */
.overlay-score {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  z-index: 50; opacity: 0;
}
.sc-wrap {
  display: flex; align-items: stretch;
}
.sc-team {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: rgba(5,5,14,0.97);
  border-bottom: 2px solid;
}
.sc-team.left  { border-color: var(--acc); padding-right: 24px; }
.sc-team.right { border-color: var(--blue); padding-left: 24px; flex-direction: row-reverse; }
.sc-team-name {
  font-family: var(--fd);
  font-size: 17px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 2px;
  color: #fff;
}
.sc-mid {
  display: flex; align-items: center;
  background: rgba(0,0,0,0.70);
  border-bottom: 2px solid rgba(255,255,255,0.06);
}
.sc-num {
  font-family: var(--fd);
  font-size: 52px; font-weight: 900; line-height: 1;
  padding: 6px 20px;
  min-width: 80px; text-align: center;
}
.sc-num.left  { color: var(--acc); }
.sc-num.right { color: var(--blue); }
.sc-sep {
  font-family: var(--fd);
  font-size: 28px; font-weight: 700;
  color: rgba(255,255,255,0.18);
  padding: 0 2px;
  align-self: center;
}
.sc-map {
  background: rgba(255,255,255,0.05);
  padding: 0 14px;
  border-bottom: 2px solid rgba(255,255,255,0.05);
  display: flex; align-items: center;
}
.sc-map-name {
  font-family: var(--fm);
  font-size: 9px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.30);
}

/* ═══════════════════════════════════════════════════════════════════════════
   5. ALERT — center impact text
═══════════════════════════════════════════════════════════════════════════ */
.overlay-alert {
  position: absolute; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
.al-box {
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.al-label {
  background: var(--acc);
  padding: 8px 22px;
  font-family: var(--fm);
  font-size: 10px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: #000; align-self: stretch; text-align: center;
}
.al-text {
  font-family: var(--fd);
  font-size: 130px; font-weight: 900; font-style: italic;
  text-transform: uppercase; letter-spacing: -2px;
  line-height: 0.88; color: #fff; text-align: center;
  padding: 0 28px;
  background: rgba(0,0,6,0.82);
}

/* ═══════════════════════════════════════════════════════════════════════════
   6. HYPE — full-screen impact
═══════════════════════════════════════════════════════════════════════════ */
.overlay-hype {
  position: absolute; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
.hy-text {
  font-family: var(--fd);
  font-size: 200px; font-weight: 900; font-style: italic;
  text-transform: uppercase; letter-spacing: -6px;
  line-height: 0.85; text-align: center;
}

/* ═══════════════════════════════════════════════════════════════════════════
   7. GG — match over
═══════════════════════════════════════════════════════════════════════════ */
.overlay-gg {
  position: absolute; inset: 0; z-index: 75;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  background: rgba(0,0,6,0.94);
}
.gg-inner {
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.gg-pre {
  font-family: var(--fm);
  font-size: 11px; font-weight: 700;
  letter-spacing: 8px; text-transform: uppercase;
  color: rgba(255,255,255,0.30);
  margin-bottom: 12px;
}
.gg-title {
  font-family: var(--fd);
  font-size: 160px; font-weight: 900; font-style: italic;
  text-transform: uppercase; letter-spacing: -5px; line-height: 0.82;
  color: #fff;
}
.gg-bar {
  width: 480px; height: 4px;
  background: var(--acc);
  margin: 22px 0;
}
.gg-sub {
  font-family: var(--fd);
  font-size: 22px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}

/* ═══════════════════════════════════════════════════════════════════════════
   8. BRB — full-screen break
═══════════════════════════════════════════════════════════════════════════ */
.overlay-brb {
  position: absolute; inset: 0; z-index: 90; opacity: 0;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
}
.brb-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.brb-tag {
  background: var(--acc);
  padding: 10px 26px;
  font-family: var(--fm);
  font-size: 10px; font-weight: 700;
  letter-spacing: 7px; text-transform: uppercase;
  color: #000;
}
.brb-title {
  font-family: var(--fd);
  font-size: 112px; font-weight: 900; font-style: italic;
  text-transform: uppercase; letter-spacing: -3px; line-height: 0.88;
  color: #fff; margin-top: 14px; text-align: center;
}
.brb-line {
  width: 360px; height: 3px; background: var(--acc);
  margin: 24px 0;
}
.brb-sub {
  font-family: var(--fm);
  font-size: 12px; font-weight: 500;
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(255,255,255,0.30);
}
.brb-url {
  font-family: var(--fm);
  font-size: 15px; font-weight: 700;
  letter-spacing: 3px;
  color: var(--acc);
  margin-top: 10px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   9. POPUP — top-right notification
═══════════════════════════════════════════════════════════════════════════ */
.overlay-popup {
  position: absolute; top: 32px; right: 44px;
  z-index: 70; opacity: 0;
}
.pp-wrap {
  display: flex; align-items: stretch;
}
.pp-accent { width: 4px; flex-shrink: 0; }
.pp-body {
  background: rgba(5,5,14,0.97);
  border: 1px solid var(--b); border-left: none;
  padding: 12px 18px; min-width: 280px;
}
.pp-lbl {
  font-family: var(--fm);
  font-size: 8px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 5px;
}
.pp-text {
  font-family: var(--fd);
  font-size: 20px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px; color: #fff;
}

/* ═══════════════════════════════════════════════════════════════════════════
   10. COUNTDOWN
═══════════════════════════════════════════════════════════════════════════ */
.overlay-countdown {
  position: absolute; inset: 0; z-index: 85;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  background: rgba(0,0,6,0.88);
}
.cd-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.cd-label {
  font-family: var(--fm);
  font-size: 11px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}
.cd-num {
  font-family: var(--fd);
  font-size: 240px; font-weight: 900; font-style: italic;
  line-height: 0.80; letter-spacing: -8px;
  color: #fff;
}
.cd-sub {
  font-family: var(--fd);
  font-size: 20px; font-weight: 700;
  letter-spacing: 8px; text-transform: uppercase;
  color: var(--acc);
  margin-top: 10px;
}

/* ── AD / CLIP: basit fade ── */
.overlay-ad, .overlay-clip {
  position: absolute; inset: 0; z-index: 100; opacity: 0;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
}
.ad-text, .clip-text {
  font-family: var(--fd);
  font-size: 80px; font-weight: 900; font-style: italic;
  text-transform: uppercase; letter-spacing: -2px;
  color: var(--acc);
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://ysceuihdsatttnpnypjx.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_qST7eQaiw0uOqcFQ95DIWw__XtiMbHf';
const CHANNEL_NAME  = 'obs-overlay';
const root          = document.getElementById('root');

// ── UTILS ──────────────────────────────────────────────────────────────────
const make = (cls, html='') => {
  const el = document.createElement('div');
  el.className = cls;
  if (html) el.innerHTML = html;
  root.appendChild(el);
  return el;
};
const killClass = cls =>
  root.querySelectorAll('.' + cls).forEach(el => {
    gsap.to(el, { opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: () => el.remove() });
  });
const killAll = () =>
  root.querySelectorAll('[class^="overlay-"]').forEach(el => {
    gsap.to(el, { opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: () => el.remove() });
  });

// ── SUPABASE ───────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
sb.channel(CHANNEL_NAME, { config: { broadcast: { self: false } } })
  .on('broadcast', { event: 'trigger' }, ({ payload }) => handleTrigger(payload))
  .subscribe(s => console.log('[Overlay]', s));

function handleTrigger({ overlay, data = {} }) {
  const map = {
    banner:          showBanner,
    banner_hide:     () => killClass('overlay-banner'),
    lower:           showLower,
    lower_hide:      () => killClass('overlay-lower'),
    popup:           showPopup,
    alert:           showAlert,
    hype:            showHype,
    gg:              showGG,
    brb:             showBRB,
    brb_hide:        () => killClass('overlay-brb'),
    score:           showScore,
    score_hide:      () => killClass('overlay-score'),
    clip:            showClip,
    countdown:       showCountdown,
    ad:              showAd,
    team_stats:      showTeamStats,
    team_stats_hide: () => killClass('overlay-teamstats'),
    kill_all:        killAll,
  };
  map[overlay]?.(data);
}

// ── 1. TEAM STATS — PGL broadcast stat card ────────────────────────────────
function showTeamStats({
  label    = 'LİG DURUMU',
  tag      = 'ARHAVAL CS2 LİGİ',
  duration = 0,
  team1    = { name: 'TAKIM 1', rank: 1, wins: 0, losses: 0, points: 0, logoUrl: null },
  team2    = { name: 'TAKIM 2', rank: 2, wins: 0, losses: 0, points: 0, logoUrl: null },
} = {}) {
  killClass('overlay-teamstats');

  // ── Logo HTML ──
  const logo = (t, col) => t.logoUrl
    ? `<img src="${t.logoUrl}" alt="${t.name}">`
    : `<div class="ts-logo-init" style="color:${col}">${t.name.slice(0,2).toUpperCase()}</div>`;

  // ── Stat box HTML ──
  const box = (lbl, val, extraCls='') =>
    `<div class="ts-stat ${extraCls}">
       <div class="ts-stat-lbl">${lbl}</div>
       <div class="ts-stat-num">${val}</div>
     </div>`;

  const el = make('overlay-teamstats', `
    <div class="ts-backdrop"></div>
    <div class="ts-wrap">
      <div class="ts-hdr">
        <div class="ts-hdr-label">${label}</div>
        <div class="ts-hdr-tag">${tag}</div>
      </div>
      <div class="ts-body">

        <!-- LEFT TEAM -->
        <div class="ts-team left">
          <div class="ts-logo">${logo(team1, 'var(--acc)')}</div>
          <div class="ts-name">${team1.name}</div>
          <div class="ts-stats">
            ${box('GALİBİYET', team1.wins)}
            ${box('MAĞLUBIYET', team1.losses)}
            ${box('PUAN', team1.points, 'pts')}
          </div>
        </div>

        <!-- VS -->
        <div class="ts-vs">
          <div class="ts-vs-dot"></div>
          <div class="ts-vs-text">VS</div>
          <div class="ts-vs-dot"></div>
        </div>

        <!-- RIGHT TEAM -->
        <div class="ts-team right">
          <div class="ts-logo">${logo(team2, 'var(--blue)')}</div>
          <div class="ts-name">${team2.name}</div>
          <div class="ts-stats">
            ${box('GALİBİYET', team2.wins)}
            ${box('MAĞLUBIYET', team2.losses)}
            ${box('PUAN', team2.points, 'pts')}
          </div>
        </div>

      </div>
      <div class="ts-footer">
        <div class="ts-footer-text">ARHAVAL CS2 LİGİ</div>
      </div>
    </div>
  `);

  const backdrop = el.querySelector('.ts-backdrop');
  const wrap     = el.querySelector('.ts-wrap');
  const hdr      = el.querySelector('.ts-hdr');
  const body     = el.querySelector('.ts-body');
  const left     = el.querySelector('.ts-team.left');
  const right    = el.querySelector('.ts-team.right');
  const vs       = el.querySelector('.ts-vs');
  const footer   = el.querySelector('.ts-footer');
  const logos    = el.querySelectorAll('.ts-logo');
  const names    = el.querySelectorAll('.ts-name');
  const statRows = el.querySelectorAll('.ts-stats');
  const lbls     = el.querySelectorAll('.ts-stat-lbl');
  const nums     = el.querySelectorAll('.ts-stat-num');

  // ── Initial states ──
  gsap.set(backdrop, { opacity: 0 });
  gsap.set(wrap,     { opacity: 1 });
  gsap.set(hdr,      { clipPath: 'inset(0 100% 0 0)' });
  gsap.set(body,     { clipPath: 'inset(100% 0 0 0)' });
  gsap.set(footer,   { clipPath: 'inset(0 100% 0 0)' });
  gsap.set(left,     { x: -60, opacity: 0 });
  gsap.set(right,    { x:  60, opacity: 0 });
  gsap.set(vs,       { opacity: 0 });
  gsap.set(logos,    { opacity: 0, scale: 0.4 });
  gsap.set(names,    { clipPath: 'inset(0 0 100% 0)' });
  gsap.set(statRows, { opacity: 0 });
  gsap.set(lbls,     { clipPath: 'inset(0 100% 0 0)' });
  gsap.set(nums,     { clipPath: 'inset(100% 0 0 0)' });

  // ── Entry timeline ──
  const tl = gsap.timeline();

  tl
    // backdrop
    .to(backdrop, { opacity: 1, duration: 0.22, ease: 'power2.out' })
    // header wipes left→right
    .to(hdr, { clipPath: 'inset(0 0% 0 0)', duration: 0.30, ease: 'power3.out' }, 0.06)
    // body wipes up from bottom
    .to(body, { clipPath: 'inset(0% 0 0 0)', duration: 0.28, ease: 'power3.out' }, 0.20)
    // teams slam in
    .to(left,  { x: 0, opacity: 1, duration: 0.36, ease: 'expo.out' }, 0.22)
    .to(right, { x: 0, opacity: 1, duration: 0.36, ease: 'expo.out' }, 0.26)
    // logos pop
    .to(logos, { opacity: 1, scale: 1, duration: 0.32, ease: 'back.out(1.6)', stagger: 0.05 }, 0.34)
    // names wipe up
    .to(names, { clipPath: 'inset(0 0 0% 0)', duration: 0.24, ease: 'power3.out', stagger: 0.05 }, 0.42)
    // stat rows appear
    .to(statRows, { opacity: 1, duration: 0.18, stagger: 0.05 }, 0.48)
    // stat labels wipe left→right (tight stagger)
    .to(lbls, { clipPath: 'inset(0 0% 0 0)', duration: 0.20, ease: 'power2.out', stagger: 0.05 }, 0.50)
    // numbers wipe top→bottom
    .to(nums, { clipPath: 'inset(0% 0 0 0)', duration: 0.22, ease: 'power2.out', stagger: 0.04 }, 0.58)
    // VS + footer
    .to(vs,     { opacity: 1, duration: 0.20 }, 0.38)
    .to(footer, { clipPath: 'inset(0 0% 0 0)', duration: 0.28, ease: 'power3.out' }, 0.56);

  // ── Count-up: points ──
  [left, right].forEach((panel, i) => {
    const target = i === 0 ? team1.points : team2.points;
    const numEl  = panel.querySelector('.ts-stat.pts .ts-stat-num');
    if (!numEl) return;
    numEl.textContent = '0';
    const c = { val: 0 };
    gsap.to(c, {
      val: target, duration: 1.4, ease: 'expo.out', delay: 0.60,
      onUpdate: () => { numEl.textContent = Math.round(c.val); },
    });
  });

  // ── Count-up: W / L ──
  el.querySelectorAll('.ts-stat:not(.pts) .ts-stat-num').forEach(numEl => {
    const target = parseInt(numEl.textContent, 10);
    if (isNaN(target) || target === 0) return;
    numEl.textContent = '0';
    const c = { val: 0 };
    gsap.to(c, {
      val: target, duration: 0.85, ease: 'expo.out', delay: 0.60,
      onUpdate: () => { numEl.textContent = Math.round(c.val); },
    });
  });

  // ── Exit ──
  if (duration > 0) {
    setTimeout(() => {
      const etl = gsap.timeline({ onComplete: () => el.remove() });
      etl
        .to(footer, { clipPath: 'inset(0 100% 0 0)', duration: 0.18, ease: 'power2.in' })
        .to([left, right], {
          x: (i) => i === 0 ? -80 : 80,
          opacity: 0, duration: 0.26, ease: 'power3.in', stagger: 0.04
        }, 0.02)
        .to(hdr,      { clipPath: 'inset(0 100% 0 0)', duration: 0.20, ease: 'power3.in' }, 0.04)
        .to(body,     { clipPath: 'inset(100% 0 0 0)', duration: 0.22, ease: 'power3.in' }, 0.06)
        .to(backdrop, { opacity: 0, duration: 0.22, ease: 'power2.in' }, 0.10);
    }, duration * 1000);
  }
}

// ── 10. COUNTDOWN ──────────────────────────────────────────────────────────
function showCountdown({
  from  = 5,
  label = 'Maç Başlıyor',
  sub   = 'ARHAVAL CS2',
  color = '#FF4D00',
} = {}) {
  killClass('overlay-countdown');
  const el = make('overlay-countdown', `
    <div class="cd-inner">
      <div class="cd-label">${label}</div>
      <div class="cd-num" style="color:${color}">${from}</div>
      <div class="cd-sub">${sub}</div>
    </div>
  `);

  const numEl = el.querySelector('.cd-num');
  gsap.set(el, { opacity: 0 });
  gsap.to(el, { opacity: 1, duration: 0.24 });

  let current = from;
  const tick = () => {
    if (current <= 0) {
      gsap.to(el, { opacity: 0, duration: 0.28, onComplete: () => el.remove() });
      return;
    }
    gsap.fromTo(numEl,
      { clipPath: 'inset(0 0 100% 0)' },
      { clipPath: 'inset(0 0 0% 0)', duration: 0.20, ease: 'power2.out' }
    );
    current--;
    setTimeout(() => {
      gsap.to(numEl, {
        clipPath: 'inset(100% 0 0 0)', duration: 0.18, ease: 'power2.in',
        onComplete: () => { numEl.textContent = current; setTimeout(tick, 80); },
      });
    }, 820);
  };
  tick();
}
